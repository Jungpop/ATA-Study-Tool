<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Study Tool</title>

  <style>
    body {
      font-family: -apple-system;
      background: #fafafa;
    }

    #editor {
      max-width: 700px;
      margin: 50px auto;
    }

    .block {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
    }

    .block:focus {
      outline: none;
      background: #f0f0f0;
    }

    button {
      margin: 10px;
    }
  </style>
</head>

<body>

  <h2 style="text-align:center;">📘 Study Tool</h2>

  <div id="editor">
    <div class="block" contenteditable="true">여기에 입력</div>
  </div>

  <div style="text-align:center;">
    <button onclick="addBlock()">+ 블록 추가</button>
  </div>

  <script>
    function addBlock() {
      const editor = document.getElementById("editor");

      const newBlock = document.createElement("div");
      newBlock.className = "block";
      newBlock.contentEditable = true;

      editor.appendChild(newBlock);
      newBlock.focus();
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();

        const selection = window.getSelection();
        const currentBlock = selection.anchorNode.parentElement;

        if (currentBlock.classList.contains("block")) {
          const newBlock = document.createElement("div");
          newBlock.className = "block";
          newBlock.contentEditable = true;

          currentBlock.after(newBlock);
          newBlock.focus();
        }
      }
    });
  </script>

</body>
</html>
