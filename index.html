<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070d1a">
<title>ATA Study Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:       #06101e;
  --s1:       #0b1828;
  --s2:       #102030;
  --s3:       #162840;
  --border:   #1c3050;
  --borderL:  #254060;
  --accent:   #0ea5e9;
  --accentD:  #0284c7;
  --green:    #10b981;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --text:     #cbd5e1;
  --textM:    #7a9ab8;
  --textS:    #3d5878;
  --white:    #f8fafc;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Noto Sans KR', sans-serif;
  --r:        8px;
  --rS:       5px;
  --shadow:   0 4px 24px rgba(0,0,0,.45);
  --shadowL:  0 8px 40px rgba(0,0,0,.6);
  --hdr:      52px;
  --tb:       56px;
  --bnav:     60px;
  --sidebar:  248px;
  --rsidebar: 268px;
  --safe-t: env(safe-area-inset-top,0px);
  --safe-b: env(safe-area-inset-bottom,0px);
  --safe-l: env(safe-area-inset-left,0px);
  --safe-r: env(safe-area-inset-right,0px);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);
  overscroll-behavior:none;
  padding-top:var(--safe-t);padding-left:var(--safe-l);padding-right:var(--safe-r);}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--sans);-webkit-appearance:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
#shell{display:flex;flex-direction:column;height:100%;position:relative;}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
#hdr{
  height:var(--hdr);flex-shrink:0;
  background:linear-gradient(135deg,#06101e,#0b1c30);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  position:relative;z-index:200;
}
.logo{
  display:flex;align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--accent),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-icon{font-size:20px;-webkit-text-fill-color:initial;}
.logo-text{font-size:15px;font-weight:700;letter-spacing:.5px;}
.logo-sub{font-size:10px;color:var(--textS);letter-spacing:1.5px;font-family:var(--mono);-webkit-text-fill-color:var(--textS);}
#hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.hbtn{
  height:34px;padding:0 12px;border-radius:var(--rS);
  border:1px solid var(--border);color:var(--textM);font-size:12px;
  background:transparent;transition:all .15s;display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.hbtn:active,.hbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(14,165,233,.08);}
.hbtn.danger:active,.hbtn.danger:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08);}
.hbtn .ico{font-size:14px;}
/* hamburger — mobile only */
#menuBtn{
  display:none;width:38px;height:38px;border-radius:var(--rS);
  border:1px solid var(--border);color:var(--textM);font-size:18px;
  background:transparent;align-items:center;justify-content:center;flex-shrink:0;
}

/* ═══════════════════════════════════════════
   SIDEBAR TOGGLE — overlay + blur (Split View style)
═══════════════════════════════════════════ */
/* main은 항상 1fr center만 */
#main{flex:1;display:grid;grid-template-columns:var(--sidebar) 1fr var(--rsidebar);overflow:hidden;min-height:0;}

/* 사이드바가 닫힐 때: 캔버스는 그대로, 사이드바만 슬라이드 아웃 */
#sideL{
  background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1), opacity .28s;
  transform:translateX(0);
  position:relative;z-index:10;
}
#sideR{
  background:var(--s1);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1), opacity .28s;
  transform:translateX(0);
  position:relative;z-index:10;
}

/* 닫힘 상태 */
#sideL.collapsed{transform:translateX(-100%);opacity:0;pointer-events:none;}
#sideR.collapsed{transform:translateX(100%);opacity:0;pointer-events:none;}

/* canvas blur overlay — 사이드바 닫을 때 캔버스에 블러 씌우기 */
#cwBlur{
  position:absolute;inset:0;z-index:100;
  background:rgba(6,16,30,.45);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  pointer-events:none;
  opacity:0;
  transition:opacity .28s cubic-bezier(.4,0,.2,1);
}
#cwBlur.on{opacity:1;pointer-events:all;}

/* grid는 항상 3칸 유지 — 닫힌 사이드바 자리를 캔버스가 차지하도록 */
#main.hide-L{grid-template-columns:0 1fr var(--rsidebar);}
#main.hide-R{grid-template-columns:var(--sidebar) 1fr 0;}
#main.hide-L.hide-R{grid-template-columns:0 1fr 0;}
#main{transition:grid-template-columns .28s cubic-bezier(.4,0,.2,1);}

/* toggle buttons in header */
.side-toggle{
  height:34px;width:34px;border-radius:var(--rS);
  border:1px solid var(--border);color:var(--textM);font-size:13px;
  background:transparent;transition:all .18s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.side-toggle:hover,.side-toggle:active{border-color:var(--accent);color:var(--accent);background:rgba(14,165,233,.08);}
.side-toggle.on{background:rgba(14,165,233,.12);border-color:var(--accent);color:var(--accent);}


/* ═══════════════════════════════════════════
   SIDEBAR LEFT
═══════════════════════════════════════════ */
#sideL{
  background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.side-hdr{
  padding:11px 12px;font-size:9px;font-family:var(--mono);
  color:var(--textS);letter-spacing:2px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.side-hdr-badge{
  background:var(--accent);color:#000;font-size:8px;font-family:var(--mono);
  font-weight:700;padding:1px 6px;border-radius:10px;
}
#pageList{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch;}

/* folder */
.folder{margin-bottom:3px;}
.folder-hdr{
  display:flex;align-items:center;gap:7px;padding:9px 10px;
  border-radius:var(--r);border:1px solid transparent;
  background:var(--s2);cursor:pointer;transition:all .18s;min-height:44px;
}
.folder-hdr:active{border-color:var(--amber);background:rgba(245,158,11,.07);}
.folder-arrow{font-size:9px;color:var(--textS);transition:transform .2s;flex-shrink:0;line-height:1;}
.folder-arrow.open{transform:rotate(90deg);}
.folder-name{font-size:12px;font-weight:600;color:var(--amber);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.folder-cnt{font-size:9px;font-family:var(--mono);color:var(--textS);flex-shrink:0;}
.folder-del{
  width:26px;height:26px;border-radius:4px;color:var(--textS);font-size:15px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:all .15s;
}
.folder-hdr:hover .folder-del,.folder-hdr:active .folder-del{opacity:1;}
.folder-del:active{color:var(--red);}
.folder-pages{overflow:hidden;transition:max-height .22s ease;padding-left:10px;}

/* page item */
.pitem{
  display:flex;align-items:center;gap:6px;padding:9px 10px;
  border-radius:var(--rS);border:1px solid transparent;
  cursor:pointer;transition:all .15s;margin-bottom:2px;min-height:44px;
}
.pitem:active{background:var(--s2);}
.pitem.sel{background:rgba(14,165,233,.1);border-color:rgba(14,165,233,.4);}
.pitem-ico{font-size:12px;flex-shrink:0;color:var(--textS);}
.pitem-name{font-size:12px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pitem.sel .pitem-name{color:var(--accent);}
.pitem-cnt{font-size:9px;font-family:var(--mono);color:var(--textS);flex-shrink:0;}
.pitem-del{width:26px;height:26px;border-radius:4px;color:var(--textS);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:all .15s;}
.pitem:hover .pitem-del,.pitem:active .pitem-del{opacity:1;}
.pitem-del:active{color:var(--red);}
.pitem-edit{width:26px;height:26px;border-radius:4px;color:var(--textS);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:all .15s;}
.pitem:hover .pitem-edit,.pitem:active .pitem-edit{opacity:1;}
.pitem-edit:active{color:var(--accent);}
.uncat-label{padding:6px 8px 3px;font-size:9px;color:var(--textS);font-family:var(--mono);letter-spacing:1.5px;}

#addArea{padding:7px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.add-btn{
  width:100%;padding:10px;border-radius:var(--r);
  border:1px dashed var(--border);color:var(--textS);font-size:12px;
  background:transparent;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px;
}
.add-btn:active{border-color:var(--accent);color:var(--accent);background:rgba(14,165,233,.06);}
.add-btn.folder:active{border-color:var(--amber);color:var(--amber);}

/* ═══════════════════════════════════════════
   CENTER
═══════════════════════════════════════════ */
#center{display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}

/* canvas area */
#canvasArea{
  flex:1;overflow:auto;-webkit-overflow-scrolling:touch;
  background:radial-gradient(ellipse at 50% 0%,#0b1c30 0%,#06101e 70%);
  display:flex;align-items:flex-start;justify-content:center;padding:20px;
}
#cw{position:relative;display:inline-block;user-select:none;touch-action:none;}
#cw.m-edit{cursor:crosshair;}
#cw.m-view{cursor:default;}
#cw.m-draw{cursor:crosshair;}
#cw.m-text{cursor:text;}
#cw.m-move{cursor:grab;}
#cw.m-move .cimg{cursor:grab;}
#cw.m-move .cimg:active{cursor:grabbing;}
#cw.m-imgresize{cursor:default;}
#cw.m-imgresize .cimg{cursor:default;}
#cw.m-imgresize .cimg-rh{cursor:se-resize;}

/* 모드별 cimg 상호작용 제어 */
/* edit/view/draw/text: 이미지는 배경이므로 pointer-events 차단 */
#cw.m-edit .cimg,
#cw.m-view .cimg,
#cw.m-draw .cimg,
#cw.m-text .cimg { pointer-events:none; }
/* move: 이미지 드래그만 허용, 핸들 숨김 */
#cw.m-move .cimg { pointer-events:all; }
#cw.m-move .cimg-rh { display:none; }
#cw.m-move .cimg-del { opacity:0; }
#cw.m-move .cimg:hover .cimg-del { opacity:1; }
/* imgresize: 크기 핸들만 활성화 */
#cw.m-imgresize .cimg { pointer-events:all; }
#cw.m-imgresize .cimg-rh { display:flex; opacity:1; }

/* main image */
#MI{display:block;max-width:100%;height:auto;pointer-events:none;border-radius:var(--rS);
  box-shadow:0 0 0 1px var(--border),var(--shadow);}

/* empty state */
#emptyState{
  width:min(580px,88vw);padding:60px 40px;
  background:var(--s1);border:2px dashed var(--border);
  border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  cursor:pointer;transition:all .2s;text-align:center;
}
#emptyState:active{border-color:var(--accent);background:rgba(14,165,233,.04);}
.empty-ic{font-size:48px;}
.empty-t{font-size:16px;font-weight:500;color:var(--text);}
.empty-s{font-size:12px;color:var(--textM);}
.empty-cta{
  margin-top:6px;padding:10px 22px;background:var(--accent);
  color:#000;font-size:13px;font-weight:600;border-radius:var(--r);
  transition:all .15s;
}
#emptyState:active .empty-cta{background:var(--accentD);}

/* hotspots */
.hs{
  position:absolute;border:2px solid rgba(14,165,233,.7);
  background:rgba(14,165,233,.1);border-radius:4px;
  cursor:pointer;transition:background .15s,box-shadow .15s;
}
.hs:active,.hs:hover{background:rgba(14,165,233,.25);box-shadow:0 0 0 3px rgba(14,165,233,.2);}
.hs-lbl{
  position:absolute;top:-24px;left:-1px;
  background:var(--accent);color:#000;font-size:9px;
  font-family:var(--mono);font-weight:700;padding:2px 7px;
  white-space:nowrap;border-radius:3px 3px 3px 0;pointer-events:none;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.hs-n{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--accent);color:#000;font-size:9px;font-family:var(--mono);
  font-weight:700;width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.3);pointer-events:none;
}

/* hotspot delete button */
.hs-del{
  position:absolute;top:-10px;right:-10px;
  width:22px;height:22px;border-radius:50%;
  background:var(--red);color:#fff;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
  opacity:0;transition:opacity .15s;
  z-index:10;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
  pointer-events:all;
}
.hs:hover .hs-del,
.hs:focus .hs-del,
.hs.show-del .hs-del{ opacity:1; }
/* edit 모드에서만 삭제버튼 노출 */
#cw:not(.m-edit) .hs-del{ display:none; }
  position:absolute;border:2px dashed var(--green);
  background:rgba(16,185,129,.08);pointer-events:none;border-radius:3px;
}

/* ─── multi image ─── */
.cimg{position:absolute;user-select:none;touch-action:none;pointer-events:none;}
.cimg img{display:block;pointer-events:none;border-radius:var(--rS);box-shadow:0 2px 12px rgba(0,0,0,.4);width:100%;}
.cimg-del{
  position:absolute;top:-10px;right:-10px;
  width:22px;height:22px;border-radius:50%;
  background:var(--red);color:#fff;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);opacity:0;transition:opacity .15s;
  z-index:60;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.cimg:hover .cimg-del,.cimg.selected .cimg-del{opacity:1;}
.cimg-rh{
  position:absolute;bottom:-8px;right:-8px;
  width:20px;height:20px;border-radius:4px;
  background:var(--green);border:2px solid var(--bg);
  cursor:se-resize;z-index:60;
  opacity:0.6;transition:opacity .15s;
  touch-action:none;
}
.cimg:hover .cimg-rh,.cimg.selected .cimg-rh{opacity:1;}
.cimg.selected{outline:2px solid var(--accent);outline-offset:2px;}
/* canvas 기준 이미지는 첫번째 이미지 */
#MI{display:none;} /* 기존 단일 MI는 숨김 처리 */
.rh{position:absolute;width:16px;height:16px;background:var(--green);border:2px solid var(--bg);border-radius:3px;z-index:50;}
.rh.tl{top:-8px;left:-8px;cursor:nw-resize;} .rh.tm{top:-8px;left:calc(50% - 8px);cursor:n-resize;}
.rh.tr{top:-8px;right:-8px;cursor:ne-resize;} .rh.ml{top:calc(50% - 8px);left:-8px;cursor:w-resize;}
.rh.mr{top:calc(50% - 8px);right:-8px;cursor:e-resize;} .rh.bl{bottom:-8px;left:-8px;cursor:sw-resize;}
.rh.bm{bottom:-8px;left:calc(50% - 8px);cursor:s-resize;} .rh.br{bottom:-8px;right:-8px;cursor:se-resize;}
#rOv{position:absolute;inset:0;border:2px solid var(--green);pointer-events:none;z-index:40;border-radius:var(--rS);}
#rInfo{
  position:absolute;top:-30px;left:0;background:var(--green);color:#000;
  font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:3px;white-space:nowrap;pointer-events:none;z-index:51;
}

/* ─── draw canvas ─── */
#DC{position:absolute;top:0;left:0;pointer-events:none;z-index:30;border-radius:var(--rS);}
#cw.m-draw #DC{pointer-events:all;}
#cw.m-draw .hs{pointer-events:none;}

/* ─── text boxes ─── */
.tb{position:absolute;z-index:35;}
.tb textarea{
  width:100%;height:100%;min-height:38px;
  background:rgba(6,16,30,.82);
  border:1.5px solid rgba(16,185,129,.6);
  border-radius:6px;color:#fff;font-size:14px;
  font-family:var(--sans);padding:8px 10px;resize:both;
  outline:none;line-height:1.6;
}
.tb textarea::placeholder{color:rgba(255,255,255,.25);}
.tb textarea:focus{border-color:var(--green);}
.tb-del{
  position:absolute;top:-10px;right:-10px;width:22px;height:22px;
  border-radius:50%;background:var(--red);color:#fff;font-size:13px;
  display:flex;align-items:center;justify-content:center;z-index:36;
  opacity:0;transition:opacity .15s;box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.tb:hover .tb-del,.tb:focus-within .tb-del{opacity:1;}
#cw.m-view .tb{pointer-events:none;}
#cw.m-view .tb textarea{background:rgba(6,16,30,.65);pointer-events:none;}
#cw.m-view .tb-del{display:none;}
#cw.m-text .hs{pointer-events:none;}

/* ═══════════════════════════════════════════
   TOOLBAR
═══════════════════════════════════════════ */
#tb{
  height:var(--tb);flex-shrink:0;
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:5px;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
}
#tb::-webkit-scrollbar{display:none;}

.tbtn{
  height:38px;padding:0 13px;border-radius:var(--r);
  border:1px solid var(--border);color:var(--textM);font-size:12px;
  background:transparent;transition:all .15s;
  display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;
  min-width:44px;justify-content:center;
}
.tbtn:active,.tbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(14,165,233,.08);}
.tbtn.on{background:rgba(14,165,233,.12);border-color:var(--accent);color:var(--accent);}
.tbtn.on-g{background:rgba(16,185,129,.12);border-color:var(--green);color:var(--green);}
.tbtn.del-btn{color:var(--textS);}
.tbtn.del-btn:active,.tbtn.del-btn:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.07);}
.t-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;margin:0 2px;}
.t-tip{font-size:10px;color:var(--textS);font-family:var(--mono);white-space:nowrap;flex-shrink:0;padding:0 4px;}

/* draw controls */
#drawCtrl{display:none;align-items:center;gap:6px;flex-shrink:0;}
#drawCtrl.show{display:flex;}
.dc-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.dc-lbl{font-size:9px;color:var(--textS);font-family:var(--mono);}
.cc{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.cc.on{border-color:#fff;transform:scale(1.2);}
.szb{width:32px;height:32px;border-radius:5px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.szb.on{border-color:var(--accent);background:rgba(14,165,233,.12);}
.dot{background:#fff;border-radius:50%;pointer-events:none;}

/* ═══════════════════════════════════════════
   SIDEBAR RIGHT
═══════════════════════════════════════════ */
#sideR{
  background:var(--s1);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#hsList{flex:1;overflow-y:auto;padding:7px;-webkit-overflow-scrolling:touch;}
.hsc{
  padding:11px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all .15s;
}
.hsc:active,.hsc:hover{border-color:rgba(14,165,233,.4);background:rgba(14,165,233,.05);}
.hsc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.hsc-n{
  background:var(--accent);color:#000;font-size:9px;font-family:var(--mono);
  font-weight:700;width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hsc-title{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hsc-del{
  width:28px;height:28px;border-radius:5px;color:var(--textS);font-size:16px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s;
}
.hsc-del:active{color:var(--red);}
.hsc-prev{font-size:11px;color:var(--textM);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5;}
.empty-hs{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:30px 16px;color:var(--textS);font-size:12px;text-align:center;height:100%;
}
.empty-hs-ic{font-size:32px;opacity:.5;}

/* ═══════════════════════════════════════════
   SLIDE PANELS (mobile)
═══════════════════════════════════════════ */
#overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:400;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
#overlay.on{display:block;}
.spanel{
  position:fixed;top:0;bottom:0;background:var(--s1);
  z-index:410;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadowL);
}
.spanel.L{left:0;width:min(276px,82vw);border-right:1px solid var(--border);transform:translateX(-100%);}
.spanel.R{right:0;width:min(276px,82vw);border-left:1px solid var(--border);transform:translateX(100%);}
.spanel.open{transform:translateX(0);}
.sp-hdr{
  padding:13px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sp-title{font-size:11px;font-family:var(--mono);color:var(--textS);letter-spacing:2px;}
.sp-close{
  width:34px;height:34px;border-radius:6px;color:var(--textM);font-size:20px;
  display:flex;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--border);
}
.sp-close:active{color:var(--red);}
.sp-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sp-add{padding:7px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0;}

/* ═══════════════════════════════════════════
   BOTTOM NAV (mobile)
═══════════════════════════════════════════ */
#bnav{
  display:none;height:var(--bnav);flex-shrink:0;
  background:var(--s1);border-top:1px solid var(--border);
  align-items:center;justify-content:space-around;
  padding:0 4px;
  padding-bottom:var(--safe-b);
}
.bnt{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;border-radius:8px;color:var(--textS);
  background:transparent;font-size:8px;font-family:var(--sans);
  transition:all .15s;min-height:48px;justify-content:center;
}
.bnt .bi{font-size:20px;line-height:1;}
.bnt.on{color:var(--accent);}
.bnt:active{background:rgba(14,165,233,.08);}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
.modal-wrap{
  position:fixed;inset:0;background:rgba(4,10,20,.88);z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.modal{
  background:var(--s1);border:1px solid var(--borderL);border-radius:14px;
  width:min(620px,96vw);max-height:min(88vh,780px);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:var(--shadowL);
}
.m-hdr{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.m-badge{
  background:linear-gradient(135deg,var(--accent),var(--green));
  color:#000;font-family:var(--mono);font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:12px;flex-shrink:0;
}
.m-title-in{
  flex:1;background:transparent;border:none;color:var(--white);
  font-size:15px;font-weight:600;outline:none;
}
.m-title-in::placeholder{color:var(--textS);}
.m-close{
  width:34px;height:34px;border-radius:7px;color:var(--textM);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  background:var(--s2);border:1px solid var(--border);flex-shrink:0;
}
.m-close:active{color:var(--red);}
.m-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;}
.m-tabs{display:flex;gap:6px;}
.m-tab{
  padding:8px 16px;background:transparent;border:1px solid var(--border);
  color:var(--textM);font-size:12px;border-radius:var(--r);
  transition:all .15s;min-height:40px;
}
.m-tab.on{background:rgba(14,165,233,.12);border-color:rgba(14,165,233,.5);color:var(--accent);}
.m-tab:active{background:rgba(14,165,233,.08);}
.tc{display:none;flex-direction:column;gap:12px;}
.tc.on{display:flex;}
.flbl{font-size:10px;color:var(--textS);font-family:var(--mono);letter-spacing:1px;margin-bottom:3px;}
textarea.fin,input.fin,select.fin{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-size:13px;border-radius:var(--r);padding:11px 13px;outline:none;
  transition:border-color .15s;width:100%;
}
textarea.fin:focus,input.fin:focus,select.fin:focus{border-color:rgba(14,165,233,.6);}
textarea.fin{resize:vertical;min-height:110px;line-height:1.6;}
.vt{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;}
.vi{max-width:100%;border-radius:8px;margin-top:8px;border:1px solid var(--border);}
.vtbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;border-radius:var(--r);overflow:hidden;}
.vtbl th{background:var(--s3);color:var(--accent);padding:9px 12px;text-align:left;border:1px solid var(--border);font-size:11px;}
.vtbl td{padding:9px 12px;border:1px solid var(--border);color:var(--text);}
.vtbl tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.t-ctrl{display:flex;gap:6px;flex-wrap:wrap;}
.t-in{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.t-in table{width:100%;border-collapse:collapse;}
.t-in td{padding:0;border:1px solid var(--border);}
.t-in td input{width:100%;border:none;background:transparent;padding:9px 10px;font-size:12px;color:var(--text);outline:none;font-family:var(--sans);}
.t-in td.th input{color:var(--accent);font-weight:600;}
.up-area{
  border:2px dashed var(--border);border-radius:var(--r);padding:28px;
  text-align:center;cursor:pointer;color:var(--textS);font-size:13px;transition:all .15s;
}
.up-area:active{border-color:var(--accent);color:var(--accent);}
.m-footer{
  padding:14px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}
.btn{padding:10px 22px;border-radius:var(--r);font-size:13px;min-height:42px;border:none;transition:all .15s;font-weight:500;}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accentD));color:#000;font-weight:700;}
.btn-p:active{opacity:.85;}
.btn-s{background:var(--s2);color:var(--textM);border:1px solid var(--border);}
.btn-s:active{border-color:var(--accent);color:var(--accent);}

/* ─── mini dialog ─── */
.dlg-wrap{
  position:fixed;inset:0;background:rgba(4,10,20,.78);z-index:600;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.dlg{
  background:var(--s1);border:1px solid var(--borderL);border-radius:14px;
  padding:22px;width:min(390px,95vw);display:flex;flex-direction:column;gap:14px;
  box-shadow:var(--shadowL);
}
.dlg-title{font-size:15px;font-weight:700;color:var(--white);}
.dlg-sub{font-size:12px;color:var(--textM);}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast{
  position:fixed;bottom:calc(var(--bnav) + 16px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--borderL);
  color:var(--text);font-size:12px;padding:9px 16px;
  border-radius:20px;white-space:nowrap;z-index:700;
  opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:1024px){
  #main{grid-template-columns:1fr !important;}
  #sideL,#sideR{display:none;}
  #menuBtn{display:flex;}
  #bnav{display:flex;}
  #canvasArea{padding:10px;}
  .t-tip{display:none;}
  #btnToggleL,#btnToggleR{display:none !important;}
}
@media(max-width:600px){
  :root{--hdr:46px;--tb:46px;}
  .logo-sub{display:none;}
}
@media(max-height:500px){
  :root{--hdr:40px;--tb:40px;--bnav:46px;}
  .bnt .bi{font-size:17px;}
  .bnt span:last-child{display:none;}
  #canvasArea{padding:6px;}
}
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <header id="hdr">
    <div class="header-left" style="display:flex;align-items:center;gap:10px;">
      <button id="menuBtn" onclick="togglePanel('L')">☰</button>
      <div class="logo">
        <span class="logo-icon">✈️</span>
        <div>
          <div class="logo-text">ATA Study Tool</div>
          <div class="logo-sub">EASA Part-66 B1/B2</div>
        </div>
      </div>
    </div>
    <div id="hdr-right">
      <button class="side-toggle on" id="btnToggleL" onclick="toggleSideL()" title="페이지 패널 열기/닫기">📁</button>
      <button class="hbtn" onclick="exportData()"><span class="ico">💾</span><span>내보내기</span></button>
      <button class="hbtn" onclick="importData()"><span class="ico">📂</span><span>불러오기</span></button>
      <button class="hbtn" id="rPanelBtn" style="display:none" onclick="togglePanel('R')"><span class="ico">📋</span></button>
      <button class="hbtn danger" onclick="resetAll()"><span class="ico">🗑</span></button>
      <button class="side-toggle on" id="btnToggleR" onclick="toggleSideR()" title="핫스팟 패널 열기/닫기">📋</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>
  </header>

  <!-- OVERLAY (mobile panels) -->
  <div id="overlay" onclick="closeAllPanels()"></div>

  <!-- LEFT SLIDE PANEL (mobile) -->
  <div class="spanel L" id="panelL">
    <div class="sp-hdr">
      <span class="sp-title">PAGES</span>
      <button class="sp-close" onclick="closeAllPanels()">×</button>
    </div>
    <div class="sp-body" id="pageListM" style="padding:6px;"></div>
    <div class="sp-add">
      <button class="add-btn folder" onclick="startAdd('folder')">📁 새 폴더 추가</button>
      <button class="add-btn" onclick="startAdd('page')">＋ 새 페이지 추가</button>
    </div>
  </div>

  <!-- RIGHT SLIDE PANEL (mobile) -->
  <div class="spanel R" id="panelR">
    <div class="sp-hdr">
      <span class="sp-title">HOTSPOTS</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="hsCountM" style="color:var(--accent);font-size:10px;font-family:var(--mono)"></span>
        <button class="sp-close" onclick="closeAllPanels()">×</button>
      </div>
    </div>
    <div class="sp-body" id="hsListM" style="padding:7px;"></div>
  </div>

  <!-- MAIN 3-COL -->
  <div id="main">

    <!-- LEFT SIDEBAR -->
    <div id="sideL">
      <div class="side-hdr">
        <span>폴더 / 페이지</span>
        <span class="side-hdr-badge" id="pageCnt">0</span>
      </div>
      <div id="pageList"></div>
      <div id="addArea">
        <button class="add-btn folder" onclick="startAdd('folder')">📁 새 폴더 추가</button>
        <button class="add-btn" onclick="startAdd('page')">＋ 새 페이지 추가</button>
      </div>
    </div>

    <!-- CENTER -->
    <div id="center">
      <div id="canvasArea" style="position:relative;">
        <div id="cwBlur"></div>
        <div id="cw" class="m-edit">
          <div id="emptyState" onclick="triggerImg()">
            <div class="empty-ic">🗂️</div>
            <div class="empty-t">학습 자료 이미지를 추가하세요</div>
            <div class="empty-s">Flow Chart · 시스템 스케메틱 · 다이어그램</div>
            <div class="empty-cta">이미지 선택하기</div>
          </div>
          <img id="MI" src="" alt="" style="display:none">
          <canvas id="DC" style="display:none"></canvas>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div id="tb">
        <button class="tbtn on" id="bEdit"      onclick="setMode('edit')"      title="E">✏️ 영역 지정</button>
        <button class="tbtn"    id="bView"      onclick="setMode('view')"      title="V">👁 학습 모드</button>
        <button class="tbtn"    id="bDraw"      onclick="setMode('draw')"      title="D">🖊 필기</button>
        <button class="tbtn"    id="bText"      onclick="setMode('text')"      title="T">🔤 텍스트</button>
        <div class="t-sep"></div>
        <button class="tbtn"    id="bMove"      onclick="setMode('move')"      title="M">✋ 이미지 이동</button>
        <button class="tbtn"    id="bImgresize" onclick="setMode('imgresize')" title="Z">⤡ 이미지 크기</button>
        <div class="t-sep"></div>
        <button class="tbtn" onclick="triggerImg()">🖼 이미지 추가</button>
        <button class="tbtn del-btn" onclick="clearHotspots()">🗑 영역 전체삭제</button>
        <input type="file" id="imgFile" accept="image/*" multiple style="display:none" onchange="loadImg(event)">

        <!-- draw controls -->
        <div id="drawCtrl">
          <div class="dc-sep"></div>
          <span class="dc-lbl">색상</span>
          <div class="cc on" id="c0" style="background:#10b981" onclick="setDC('#10b981',0)"></div>
          <div class="cc" id="c1" style="background:#ef4444" onclick="setDC('#ef4444',1)"></div>
          <div class="cc" id="c2" style="background:#f59e0b" onclick="setDC('#f59e0b',2)"></div>
          <div class="cc" id="c3" style="background:#0ea5e9" onclick="setDC('#0ea5e9',3)"></div>
          <div class="cc" id="c4" style="background:#a855f7" onclick="setDC('#a855f7',4)"></div>
          <div class="cc" id="c5" style="background:#f8fafc" onclick="setDC('#f8fafc',5)"></div>
          <div class="dc-sep"></div>
          <span class="dc-lbl">굵기</span>
          <button class="szb on" id="s0" onclick="setDS(2,0)"><div class="dot" style="width:2px;height:2px"></div></button>
          <button class="szb" id="s1" onclick="setDS(5,1)"><div class="dot" style="width:5px;height:5px"></div></button>
          <button class="szb" id="s2" onclick="setDS(10,2)"><div class="dot" style="width:10px;height:10px"></div></button>
          <button class="szb" id="s3" onclick="setDS(18,3)"><div class="dot" style="width:15px;height:15px"></div></button>
          <div class="dc-sep"></div>
          <button class="szb" id="sEr" onclick="setEraser()" title="지우개" style="font-size:14px">⬜</button>
          <div class="dc-sep"></div>
          <button class="tbtn" onclick="undoDraw()" style="height:32px;padding:0 10px;font-size:12px">↩ 취소</button>
          <button class="tbtn del-btn" onclick="clearDraw()" style="height:32px;padding:0 10px;font-size:12px">🗑 전체</button>
        </div>
        <span class="t-tip" id="tip">이미지 위를 드래그하여 핫스팟 영역 지정</span>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div id="sideR">
      <div class="side-hdr">
        <span>핫스팟 목록</span>
        <span class="side-hdr-badge" id="hsCnt">0</span>
      </div>
      <div id="hsList"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bnav">
    <button class="bnt on" id="bnEdit"      onclick="setMode('edit')">      <span class="bi">✏️</span><span>영역</span></button>
    <button class="bnt"    id="bnView"      onclick="setMode('view')">      <span class="bi">👁</span><span>학습</span></button>
    <button class="bnt"    id="bnDraw"      onclick="setMode('draw')">      <span class="bi">🖊</span><span>필기</span></button>
    <button class="bnt"    id="bnText"      onclick="setMode('text')">      <span class="bi">🔤</span><span>텍스트</span></button>
    <button class="bnt"    id="bnMove"      onclick="setMode('move')">      <span class="bi">✋</span><span>이동</span></button>
    <button class="bnt"    id="bnImgresize" onclick="setMode('imgresize')"> <span class="bi">⤡</span><span>크기</span></button>
    <button class="bnt"    onclick="togglePanel('L')"><span class="bi">📁</span><span>페이지</span></button>
    <button class="bnt"    onclick="togglePanel('R')"><span class="bi">📋</span><span>목록</span></button>
  </nav>

</div><!-- /shell -->

<!-- TOAST -->
<div id="toast"></div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-wrap" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-badge" id="eBadge">1</div>
      <input class="m-title-in" id="eTitle" placeholder="제목을 입력하세요 (예: PRSOV, Pack Valve…)">
      <button class="m-close" onclick="closeEdit()">×</button>
    </div>
    <div class="m-body">
      <div class="m-tabs">
        <button class="m-tab on" id="mt-text" data-tab="text" onclick="switchTab('text')">📝 텍스트</button>
        <button class="m-tab" id="mt-table" data-tab="table" onclick="switchTab('table')">📊 표</button>
        <button class="m-tab" id="mt-img" data-tab="img" onclick="switchTab('img')">🖼 이미지</button>
      </div>
      <div class="tc on" id="tc-text">
        <div class="flbl">설명 내용</div>
        <textarea class="fin" id="eText" placeholder="설명을 입력하세요&#10;&#10;예:&#10;• 기능: 압력 조절 및 차단&#10;• 정상 하류 압력: 45 psi&#10;• TRIP 조건: 온도 &gt; 255°C"></textarea>
      </div>
      <div class="tc" id="tc-table">
        <div class="t-ctrl">
          <button class="tbtn" onclick="tR()" style="height:36px;font-size:12px">+ 행</button>
          <button class="tbtn" onclick="tC()" style="height:36px;font-size:12px">+ 열</button>
          <button class="tbtn del-btn" onclick="tDR()" style="height:36px;font-size:12px">− 행</button>
          <button class="tbtn del-btn" onclick="tDC()" style="height:36px;font-size:12px">− 열</button>
        </div>
        <div class="t-in"><table id="eTbl"></table></div>
      </div>
      <div class="tc" id="tc-img">
        <div class="flbl">팝업 이미지</div>
        <div class="up-area" onclick="document.getElementById('popFile').click()">탭하여 이미지 선택</div>
        <input type="file" id="popFile" accept="image/*" style="display:none" onchange="loadPopImg(event)">
        <img id="popPrev" class="vi" style="display:none">
        <button class="tbtn del-btn" onclick="clearPopImg()" style="height:36px;font-size:12px;margin-top:4px">이미지 제거</button>
      </div>
    </div>
    <div class="m-footer">
      <button class="btn btn-s" onclick="closeEdit()">취소</button>
      <button class="btn btn-p" onclick="saveHS()">저장</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div id="viewModal" class="modal-wrap" style="display:none" onclick="if(event.target===this)closeView()">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-badge" id="vBadge">1</div>
      <div id="vTitle" style="flex:1;font-size:15px;font-weight:600;color:var(--white)"></div>

      <button class="btn btn-p" onclick="closeView()">닫기</button>

</div>

<!-- PAGE EDIT DIALOG (rename + folder move) -->
<div id="pageEditDlg" class="dlg-wrap" style="display:none">
  <div class="dlg">
    <div class="dlg-title">페이지 편집</div>
    <div>
      <div class="flbl">페이지 이름</div>
      <input class="fin" id="peNameInput" placeholder="페이지 이름 입력">

    <div>
      <div class="flbl">폴더 이동</div>

<!-- ADD DIALOG -->
<div id="addDlg" class="dlg-wrap" style="display:none">
  <div class="dlg">
    <div class="dlg-title" id="dlgTitle">새 폴더</div>
    <div class="dlg-sub" id="dlgSub"></div>
    <input class="fin" id="dlgInput" placeholder="">
    <div id="dlgFolderRow" style="display:none;flex-direction:column;gap:6px">
      <div class="flbl">폴더 선택 (선택사항)</div>
      <select class="fin" id="dlgFolder"></select>
    </div>

      <button class="btn btn-s" onclick="closeAdd()">취소</button>
      <button class="btn btn-p" onclick="confirmAdd()">추가</button>
    </div>

<script>
// ════════════════════════════════════════════
//  DATA MODEL
//  ST.folders: [{id, name, open}]
//  ST.pages:   [{id, folderId, name,
//                images:[{id,data,x,y,w,zIndex}],
//                hotspots:[{id,x%,y%,w%,h%,title,text,tblData,imgData,tab}],
//                drawData, tboxes:[{id,x%,y%,w%,h%,text,fs,color}]}]
// ════════════════════════════════════════════
let ST={folders:[],pages:[],cur:-1};
let mode='edit';
let addMode='folder';
let editId=null,viewId=null,popImg=null;
let drawColor='#10b981',drawSize=2,eraser=false,drawing=false,dHistory=[],lastP=null;
let resizing=false,rHandle=null,rStart=null;
let tbDrag=false,tbEl=null,tbOff={};
let imgDrag={active:false},imgResize={active:false};
let sideL_open=false,sideR_open=false;
let pageEditIdx=-1;

const $=id=>document.getElementById(id);
const DC=()=>$('DC');
const CTX=()=>DC().getContext('2d');

// ════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════
function save(){try{localStorage.setItem('ata_v5',JSON.stringify(ST));}catch(e){}}
function load(){
  try{
    // v4 → v5 migration
    let raw=localStorage.getItem('ata_v5')||localStorage.getItem('ata_v4');
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d&&Array.isArray(d.pages)){
      ST=d;
      if(!ST.folders)ST.folders=[];
      // migrate old imgData → images[]
      ST.pages.forEach(p=>{
        if(!p.images)p.images=[];
        if(p.imgData&&p.images.length===0){
          p.images=[{id:Date.now()+Math.random(),data:p.imgData,x:0,y:0,w:p.imgW||600,zIndex:0}];
          delete p.imgData; delete p.imgW;
        }
        if(!p.tboxes)p.tboxes=[];
      });
    }
  }catch(e){localStorage.removeItem('ata_v5');}
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function init(){
  load();
  checkMobile();
  initSidebars();
  renderPages();
  if(ST.pages.length>0)loadPage(ST.cur>=0?ST.cur:0);
  else renderEmptyHS();
  setupPointer();
  setupResize();
  setupDraw();
  setupTBDrag();
  setupImgDragResize();
  window.addEventListener('resize',()=>{checkMobile();refreshCanvas();});
  window.addEventListener('orientationchange',()=>setTimeout(()=>{checkMobile();refreshCanvas();},200));
}

function checkMobile(){
  const m=window.innerWidth<=1024;
  $('menuBtn').style.display=m?'flex':'none';
  $('rPanelBtn').style.display=m?'flex':'none';
  $('bnav').style.display=m?'flex':'none';
  $('btnToggleL').style.display=m?'none':'flex';
  $('btnToggleR').style.display=m?'none':'flex';
}

function refreshCanvas(){
  if(ST.cur<0)return;
  const p=ST.pages[ST.cur];
  if(p){renderCanvas(p);renderHSList(p);}
}

function resetAll(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  localStorage.removeItem('ata_v5');localStorage.removeItem('ata_v4');location.reload();
}

function toast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ════════════════════════════════════════════
//  SIDEBARS
// ════════════════════════════════════════════
function initSidebars(){
  $('sideL').classList.add('collapsed');
  $('sideR').classList.add('collapsed');
  $('main').classList.add('hide-L','hide-R');
  $('btnToggleL').classList.remove('on');
  $('btnToggleR').classList.remove('on');
}

function toggleSideL(){
  sideL_open=!sideL_open;
  const main=$('main'),sL=$('sideL'),blur=$('cwBlur');
  if(sideL_open){
    sL.classList.remove('collapsed');main.classList.remove('hide-L');
    setTimeout(()=>blur.classList.add('on'),10);
  }else{
    sL.classList.add('collapsed');main.classList.add('hide-L');
    if(!sideR_open)blur.classList.remove('on');
  }
  $('btnToggleL').classList.toggle('on',sideL_open);
  setTimeout(refreshCanvas,300);
}
function toggleSideR(){
  sideR_open=!sideR_open;
  const main=$('main'),sR=$('sideR'),blur=$('cwBlur');
  if(sideR_open){
    sR.classList.remove('collapsed');main.classList.remove('hide-R');
    setTimeout(()=>blur.classList.add('on'),10);
  }else{
    sR.classList.add('collapsed');main.classList.add('hide-R');
    if(!sideL_open)blur.classList.remove('on');
  }
  $('btnToggleR').classList.toggle('on',sideR_open);
  setTimeout(refreshCanvas,300);
}

// ════════════════════════════════════════════
//  MOBILE PANELS
// ════════════════════════════════════════════
function togglePanel(side){
  const pid=side==='L'?'panelL':'panelR';
  const panel=$(pid);
  const isOpen=panel.classList.contains('open');
  closeAllPanels();
  if(!isOpen){
    panel.classList.add('open');$('overlay').classList.add('on');
    if(side==='L')$('pageListM').innerHTML=$('pageList').innerHTML;
    if(side==='R'){$('hsListM').innerHTML=$('hsList').innerHTML;$('hsCountM').textContent=$('hsCnt').textContent;}
  }
}
function closeAllPanels(){
  ['panelL','panelR'].forEach(id=>$(id).classList.remove('open'));
  $('overlay').classList.remove('on');
}

// ════════════════════════════════════════════
//  ADD DIALOG (folder / page)
// ════════════════════════════════════════════
function startAdd(type){
  closeAllPanels();
  addMode=type;
  if(type==='folder'){
    $('dlgTitle').textContent='📁 새 폴더 추가';
    $('dlgSub').textContent='폴더로 페이지를 ATA 챕터별로 분류하세요';
    $('dlgInput').placeholder='예: ATA 21 – Air Conditioning';
    $('dlgFolderRow').style.display='none';
  }else{
    $('dlgTitle').textContent='＋ 새 페이지 추가';
    $('dlgSub').textContent='';
    $('dlgInput').placeholder='예: ATA 21-50 Cooling Schematic';
    const sel=$('dlgFolder');
    sel.innerHTML='<option value="">── 폴더 없음 (미분류) ──</option>';
    ST.folders.forEach(f=>sel.innerHTML+=`<option value="${f.id}">📁 ${eh(f.name)}</option>`);
    if(ST.cur>=0){const cp=ST.pages[ST.cur];if(cp&&cp.folderId)sel.value=cp.folderId;}
    $('dlgFolderRow').style.display='flex';
  }
  $('dlgInput').value='';
  $('addDlg').style.display='flex';
  setTimeout(()=>$('dlgInput').focus(),80);
}
function closeAdd(){$('addDlg').style.display='none';}
function confirmAdd(){
  const name=$('dlgInput').value.trim();
  if(addMode==='folder'){
    if(!name){toast('폴더 이름을 입력하세요');return;}
    ST.folders.push({id:Date.now(),name,open:true});
    save();closeAdd();renderPages();toast('폴더가 추가되었습니다');
  }else{
    const pname=name||'새 페이지';
    const fid=$('dlgFolder').value||null;
    ST.pages.push({id:Date.now(),folderId:fid,name:pname,images:[],hotspots:[],drawData:null,tboxes:[]});
    save();closeAdd();renderPages();loadPage(ST.pages.length-1);
    toast('페이지가 추가되었습니다');
  }
}

// ════════════════════════════════════════════
//  PAGE RENAME + FOLDER MOVE
// ════════════════════════════════════════════
function openPageEdit(i){
  closeAllPanels();
  pageEditIdx=i;
  const p=ST.pages[i];
  $('peNameInput').value=p.name;
  const sel=$('peFolderSel');
  sel.innerHTML='<option value="">── 폴더 없음 (미분류) ──</option>';
  ST.folders.forEach(f=>sel.innerHTML+=`<option value="${f.id}" ${p.folderId==f.id?'selected':''}>📁 ${eh(f.name)}</option>`);
  $('pageEditDlg').style.display='flex';
  setTimeout(()=>$('peNameInput').focus(),80);
}
function closePageEdit(){$('pageEditDlg').style.display='none';pageEditIdx=-1;}
function confirmPageEdit(){
  if(pageEditIdx<0)return;
  const p=ST.pages[pageEditIdx];
  const newName=$('peNameInput').value.trim();
  if(newName)p.name=newName;
  p.folderId=$('peFolderSel').value||null;
  save();renderPages();closePageEdit();
  toast('페이지가 수정되었습니다');
}

// ════════════════════════════════════════════
//  PAGE LIST
// ════════════════════════════════════════════
function renderPages(){
  if(!ST.folders)ST.folders=[];
  $('pageCnt').textContent=ST.pages.length;
  let h='';
  ST.folders.forEach(f=>{
    const fps=ST.pages.filter(p=>p.folderId==f.id);
    const open=f.open!==false;
    h+=`<div class="folder">
      <div class="folder-hdr" onclick="toggleF('${f.id}')">
        <span class="folder-arrow ${open?'open':''}">▶</span>
        <span style="font-size:13px">📁</span>
        <span class="folder-name">${eh(f.name)}</span>
        <span class="folder-cnt">${fps.length}</span>
        <button class="folder-del" onclick="event.stopPropagation();delFolder('${f.id}')">×</button>
      </div>
      <div class="folder-pages" id="fp-${f.id}" style="max-height:${open?'2000px':'0'}">
        ${fps.map(p=>pHTML(p,ST.pages.indexOf(p))).join('')}
      </div>
    </div>`;
  });
  const uncat=ST.pages.filter(p=>!p.folderId);
  if(uncat.length){
    if(ST.folders.length)h+=`<div class="uncat-label">미분류</div>`;
    h+=uncat.map(p=>pHTML(p,ST.pages.indexOf(p))).join('');
  }
  if(!ST.pages.length&&!ST.folders.length)
    h=`<div style="padding:20px;text-align:center;color:var(--textS);font-size:12px;line-height:1.7">아래 버튼으로<br>폴더나 페이지를 추가하세요</div>`;
  $('pageList').innerHTML=h;
  if($('panelL').classList.contains('open'))$('pageListM').innerHTML=h;
}
function pHTML(p,i){
  return `<div class="pitem ${i===ST.cur?'sel':''}" onclick="loadPageC(${i})">
    <span class="pitem-ico">📄</span>
    <span class="pitem-name">${eh(p.name)}</span>
    <span class="pitem-cnt">${p.hotspots.length}</span>
    <button class="pitem-edit" onclick="event.stopPropagation();openPageEdit(${i})" title="이름변경/폴더이동">✎</button>
    <button class="pitem-del" onclick="event.stopPropagation();delPage(${i})">×</button>
  </div>`;
}
function loadPageC(i){closeAllPanels();loadPage(i);}
function toggleF(fid){
  const f=ST.folders.find(x=>x.id==fid);if(!f)return;
  f.open=!f.open;save();renderPages();
}
function delFolder(fid){
  const f=ST.folders.find(x=>x.id==fid);
  const cnt=ST.pages.filter(p=>p.folderId==fid).length;
  if(!confirm(`"${f.name}" 폴더를 삭제하시겠습니까?\n(페이지 ${cnt}개는 미분류로 이동합니다)`))return;
  ST.pages.forEach(p=>{if(p.folderId==fid)p.folderId=null;});
  ST.folders=ST.folders.filter(x=>x.id!=fid);
  save();renderPages();toast('폴더가 삭제되었습니다');
}
function delPage(i){
  const p=ST.pages[i];
  if(!confirm(`"${p.name}" 페이지를 삭제하시겠습니까?`))return;
  ST.pages.splice(i,1);save();
  if(!ST.pages.length){ST.cur=-1;renderPages();showEmpty();renderEmptyHS();}
  else loadPage(Math.min(i,ST.pages.length-1));
  toast('페이지가 삭제되었습니다');
}
function loadPage(i){
  ST.cur=i;save();renderPages();
  renderCanvas(ST.pages[i]);
  renderHSList(ST.pages[i]);
}

// ════════════════════════════════════════════
//  CANVAS — 다중 이미지
// ════════════════════════════════════════════
function renderCanvas(page){
  const cw=$('cw');
  cw.querySelectorAll('.hs,.rh,.tb,.cimg,#rOv,#rInfo').forEach(e=>e.remove());
  $('emptyState').style.display='none';
  const imgs=page&&page.images?page.images:[];
  if(imgs.length===0){showEmpty();return;}
  imgs.sort((a,b)=>(a.zIndex||0)-(b.zIndex||0));
  let loaded=0;
  const onLoad=()=>{
    loaded++;
    if(loaded===imgs.length){
      renderHS(page);renderTB(page);
      if(mode==='resize')attachRH();
      syncDC();
      CTX().clearRect(0,0,DC().width,DC().height);
      if(page.drawData)restoreDraw(page.drawData);
    }
  };
  imgs.forEach(im=>makeCImgEl(im,page,onLoad));
}
function showEmpty(){
  $('emptyState').style.display='flex';
  $('cw').querySelectorAll('.hs,.rh,.tb,.cimg,#rOv,#rInfo').forEach(e=>e.remove());
  const dc=DC();if(dc.width>0)CTX().clearRect(0,0,dc.width,dc.height);
}

// ─── 개별 이미지 엘리먼트 ────────────────────
function makeCImgEl(im,page,onLoad){
  const cw=$('cw');
  const wrap=document.createElement('div');
  wrap.className='cimg';wrap.dataset.imid=im.id;
  wrap.style.cssText=`left:${im.x||0}px;top:${im.y||0}px;width:${im.w||300}px;position:absolute;z-index:${(im.zIndex||0)+1};`;

  const img=document.createElement('img');
  img.src=im.data;img.style.width='100%';img.draggable=false;
  img.style.cssText='display:block;width:100%;pointer-events:none;border-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.4);';
  img.onload=()=>{
    if(!im.w||im.w===300){im.w=Math.min(img.naturalWidth,700);wrap.style.width=im.w+'px';}
    if(onLoad)onLoad();
  };
  if(img.complete&&img.naturalWidth){
    if(!im.w||im.w===300){im.w=Math.min(img.naturalWidth,700);wrap.style.width=im.w+'px';}
    if(onLoad)setTimeout(onLoad,0);
  }

  // 삭제 버튼
  const del=document.createElement('button');
  del.className='cimg-del';del.textContent='×';del.title='이미지 삭제';
  del.addEventListener('pointerup',e=>{
    e.stopPropagation();
    if(!confirm('이 이미지를 삭제하시겠습니까?'))return;
    page.images=page.images.filter(x=>x.id!==im.id);
    wrap.remove();save();
    if(page.images.length===0)showEmpty();
    toast('이미지가 삭제되었습니다');
  });

  // ── 크기 조절 핸들 (imgresize 모드 전용) ──
  const rh=document.createElement('div');
  rh.className='cimg-rh';rh.title='드래그하여 크기 조절';
  rh.addEventListener('pointerdown',e=>{
    if(mode!=='imgresize')return;
    e.stopPropagation();e.preventDefault();
    rh.setPointerCapture(e.pointerId);
    imgResize={active:true,el:wrap,id:im.id,ox:e.clientX,ow:wrap.offsetWidth};
  });
  rh.addEventListener('pointermove',e=>{
    if(!imgResize.active||imgResize.id!==im.id)return;
    const nw=Math.max(60, imgResize.ow+(e.clientX-imgResize.ox));
    wrap.style.width=nw+'px';
  });
  rh.addEventListener('pointerup',e=>{
    if(!imgResize.active||imgResize.id!==im.id)return;
    const p=ST.pages[ST.cur];
    if(p){const obj=p.images.find(x=>x.id===im.id);if(obj){obj.w=wrap.offsetWidth;save();}}
    imgResize.active=false;
  });

  wrap.appendChild(img);wrap.appendChild(del);wrap.appendChild(rh);

  // ── 이동 드래그 (move 모드 전용) ──
  wrap.addEventListener('pointerdown',e=>{
    if(mode!=='move')return;
    if(e.target===del||e.target===rh)return;
    e.stopPropagation();e.preventDefault();
    wrap.setPointerCapture(e.pointerId);
    cw.querySelectorAll('.cimg').forEach(c=>c.classList.remove('selected'));
    wrap.classList.add('selected');
    const wr=cw.getBoundingClientRect();
    imgDrag={active:true,el:wrap,id:im.id,
      ox:e.clientX-parseFloat(wrap.style.left||0),
      oy:e.clientY-parseFloat(wrap.style.top||0),wr};
  });
  wrap.addEventListener('pointermove',e=>{
    if(!imgDrag.active||imgDrag.id!==im.id)return;
    const x=Math.max(0,e.clientX-imgDrag.wr.left-imgDrag.ox);
    const y=Math.max(0,e.clientY-imgDrag.wr.top-imgDrag.oy);
    wrap.style.left=x+'px';wrap.style.top=y+'px';
  });
  wrap.addEventListener('pointerup',e=>{
    if(!imgDrag.active||imgDrag.id!==im.id)return;
    const p=ST.pages[ST.cur];
    if(p){const obj=p.images.find(x=>x.id===im.id);
      if(obj){obj.x=parseFloat(wrap.style.left)||0;obj.y=parseFloat(wrap.style.top)||0;save();}
    }
    imgDrag.active=false;
  });
  cw.appendChild(wrap);
}

function setupImgDragResize(){
  // 드래그/리사이즈 이벤트는 각 cimg 엘리먼트에 직접 바인딩됨 (makeCImgEl)
}

// ─── HOTSPOTS ────────────────────────────────
function renderHS(page){
  $('cw').querySelectorAll('.hs').forEach(e=>e.remove());
  // 핫스팟 좌표 기준: 첫 번째 이미지
  const firstWrap=$('cw').querySelector('.cimg');
  if(!firstWrap)return;
  const iw=firstWrap.offsetWidth,ih=firstWrap.querySelector('img').offsetHeight||firstWrap.offsetWidth*0.7;
  const ox=parseFloat(firstWrap.style.left)||0,oy=parseFloat(firstWrap.style.top)||0;
  page.hotspots.forEach((hs,i)=>{
    const el=document.createElement('div');
    el.className='hs';el.dataset.id=hs.id;
    el.style.cssText=`left:${ox+hs.x*iw/100}px;top:${oy+hs.y*ih/100}px;width:${hs.w*iw/100}px;height:${hs.h*ih/100}px;`;
    const lbl=document.createElement('div');lbl.className='hs-lbl';lbl.textContent=hs.title||`영역 ${i+1}`;
    const num=document.createElement('div');num.className='hs-n';num.textContent=i+1;
    const del=document.createElement('button');
    del.className='hs-del';del.textContent='×';del.title='핫스팟 삭제';
    del.addEventListener('pointerup',e=>{
      e.stopPropagation();
      if(confirm(`"${hs.title||`영역 ${i+1}`}" 핫스팟을 삭제하시겠습니까?`))delHS(hs.id);
    });
    el.appendChild(lbl);el.appendChild(num);el.appendChild(del);
    el.addEventListener('pointerup',e=>{
      if(e.target===del)return;
      e.stopPropagation();
      if(mode==='view'){openView(hs.id);}
      else if(mode==='edit'){
        if(e.pointerType==='touch'||e.pointerType==='pen'){
          if(el.classList.contains('show-del')){el.classList.remove('show-del');openEdit(hs.id);}
          else{$('cw').querySelectorAll('.hs').forEach(h=>h.classList.remove('show-del'));el.classList.add('show-del');}
        }else openEdit(hs.id);
      }
    });
    $('cw').appendChild(el);
  });
}

// ─── TEXT BOXES ─────────────────────────────
function renderTB(page){
  $('cw').querySelectorAll('.tb').forEach(e=>e.remove());
  if(!page.tboxes)page.tboxes=[];
  const firstWrap=$('cw').querySelector('.cimg');
  if(!firstWrap)return;
  const iw=firstWrap.offsetWidth,ih=firstWrap.querySelector('img').offsetHeight||firstWrap.offsetWidth*0.7;
  page.tboxes.forEach(tb=>makeTBEl(tb,iw,ih));
}
function makeTBEl(tb,iw,ih){
  if(!iw){const fw=$('cw').querySelector('.cimg');if(!fw)return;iw=fw.offsetWidth;ih=fw.querySelector('img').offsetHeight||iw*0.7;}
  const cw=$('cw');
  const div=document.createElement('div');
  div.className='tb';div.dataset.tid=tb.id;
  div.style.cssText=`left:${tb.x*iw/100}px;top:${tb.y*ih/100}px;width:${tb.w*iw/100}px;`;
  const ta=document.createElement('textarea');
  ta.value=tb.text||'';ta.placeholder='텍스트 입력…';
  ta.style.cssText=`font-size:${tb.fs||14}px;color:${tb.color||'#fff'};height:${tb.h*ih/100}px;`;
  ta.addEventListener('input',()=>{const p=ST.pages[ST.cur];if(!p)return;const t=p.tboxes.find(x=>x.id===tb.id);if(t){t.text=ta.value;save();}});
  ta.addEventListener('pointerdown',e=>e.stopPropagation());
  const del=document.createElement('button');
  del.className='tb-del';del.textContent='×';
  del.addEventListener('pointerup',e=>{
    e.stopPropagation();
    const p=ST.pages[ST.cur];if(!p)return;
    p.tboxes=p.tboxes.filter(t=>t.id!==tb.id);
    div.remove();save();
    toast('텍스트 박스 삭제됨');
  });
  div.appendChild(ta);div.appendChild(del);
  div.addEventListener('pointerdown',e=>{
    if(mode!=='edit'&&mode!=='text')return;if(e.target===ta)return;
    tbDrag=true;tbEl=div;div.setPointerCapture(e.pointerId);
    const r=div.getBoundingClientRect(),wr=cw.getBoundingClientRect();
    tbOff={x:e.clientX-r.left,y:e.clientY-r.top,wr};e.preventDefault();
  });
  cw.appendChild(div);
}
function setupTBDrag(){
  window.addEventListener('pointermove',e=>{
    if(!tbDrag||!tbEl)return;
    const wr=tbOff.wr;
    tbEl.style.left=Math.max(0,e.clientX-wr.left-tbOff.x)+'px';
    tbEl.style.top=Math.max(0,e.clientY-wr.top-tbOff.y)+'px';
  });
  window.addEventListener('pointerup',()=>{
    if(!tbDrag||!tbEl)return;tbDrag=false;
    const fw=$('cw').querySelector('.cimg');if(!fw){tbEl=null;return;}
    const iw=fw.offsetWidth,ih=fw.querySelector('img').offsetHeight||iw*0.7;
    const id=parseInt(tbEl.dataset.tid);
    const p=ST.pages[ST.cur];if(!p){tbEl=null;return;}
    const tb=p.tboxes.find(t=>t.id===id);
    if(tb){
      tb.x=parseFloat(tbEl.style.left)/iw*100;tb.y=parseFloat(tbEl.style.top)/ih*100;
      const ta=tbEl.querySelector('textarea');
      if(ta){tb.w=ta.offsetWidth/iw*100;tb.h=ta.offsetHeight/ih*100;}
      save();
    }
    tbEl=null;
  });
}
function addTBAtClick(e){
  if(mode!=='text')return;
  const p=ST.pages[ST.cur];if(!p||!p.images||!p.images.length)return;
  if(e.target.closest('.tb'))return;
  const cw=$('cw'),fw=cw.querySelector('.cimg');if(!fw)return;
  const iw=fw.offsetWidth,ih=fw.querySelector('img').offsetHeight||iw*0.7;

  if(!p.tboxes)p.tboxes=[];

// ════════════════════════════════════════════
//  POINTER — hotspot creation drag
// ════════════════════════════════════════════
function setupPointer(){
  const cw=$('cw');
  let dragging=false,dragStart=null,selRect=null;
  cw.addEventListener('click',e=>addTBAtClick(e));
  cw.addEventListener('pointerdown',e=>{
    if(mode!=='edit')return;
    const p=ST.pages[ST.cur];if(!p||!p.images||!p.images.length)return;
    if(e.target.closest('.hs')||e.target.closest('.tb')||e.target.closest('.cimg'))return;
    dragging=true;cw.setPointerCapture(e.pointerId);
    const r=cw.getBoundingClientRect();
    dragStart={x:e.clientX-r.left,y:e.clientY-r.top};
    selRect=document.createElement('div');selRect.className='drag-rect';
    selRect.style.cssText=`left:${dragStart.x}px;top:${dragStart.y}px;width:0;height:0`;
    cw.appendChild(selRect);e.preventDefault();
  });
  cw.addEventListener('pointermove',e=>{
    if(!dragging||!selRect)return;
    const r=cw.getBoundingClientRect();
    const x=e.clientX-r.left,y=e.clientY-r.top;
    selRect.style.left=Math.min(dragStart.x,x)+'px';selRect.style.top=Math.min(dragStart.y,y)+'px';
    selRect.style.width=Math.abs(x-dragStart.x)+'px';selRect.style.height=Math.abs(y-dragStart.y)+'px';
  });
  cw.addEventListener('pointerup',e=>{
    if(!dragging||!selRect)return;dragging=false;
    const fw=cw.querySelector('.cimg');
    if(!fw){cw.removeChild(selRect);selRect=null;return;}
    const iw=fw.offsetWidth,ih=fw.querySelector('img').offsetHeight||iw*0.7;
    const ox=parseFloat(fw.style.left)||0,oy=parseFloat(fw.style.top)||0;
    const l=parseFloat(selRect.style.left)-ox,t=parseFloat(selRect.style.top)-oy;
    const w=parseFloat(selRect.style.width),h=parseFloat(selRect.style.height);
    cw.removeChild(selRect);selRect=null;
    if(w<12||h<12)return;
    const hs={id:Date.now(),x:l/iw*100,y:t/ih*100,w:w/iw*100,h:h/ih*100,
      title:'',text:'',tblData:null,imgData:null,tab:'text'};
    const p=ST.pages[ST.cur];p.hotspots.push(hs);
    renderHS(p);renderHSList(p);save();openEdit(hs.id);
  });
  cw.addEventListener('pointercancel',()=>{
    if(selRect&&selRect.parentNode)selRect.parentNode.removeChild(selRect);
    selRect=null;dragging=false;
  });
}

function triggerImg(){$('imgFile').click();}
function loadImg(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  if(ST.cur===-1){
    ST.pages.push({id:Date.now(),folderId:null,
      name:files[0].name.replace(/\.[^.]+$/,''),
      images:[],hotspots:[],drawData:null,tboxes:[]});
    ST.cur=ST.pages.length-1;renderPages();
  }
  const page=ST.pages[ST.cur];
  if(!page.images)page.images=[];
  let loaded=0;
  files.forEach((file,fi)=>{
    const r=new FileReader();
    r.onload=ev=>{
      page.images.push({
        id:Date.now()+fi+Math.random(),data:ev.target.result,
        x:20+fi*30,y:20+fi*30,w:0,zIndex:page.images.length
      });
      loaded++;
      if(loaded===files.length){
        save();renderCanvas(page);renderHSList(page);
        toast(`이미지 ${files.length}장 추가됨`);
      }
    };
    r.readAsDataURL(file);
  });
  e.target.value='';
}

function tblGet(){const rows=$('eTbl').rows;if(!rows.length)return null;return Array.from(rows).map(r=>Array.from(r.cells).map(c=>c.querySelector('input').value));}
function tblLoad(d){$('eTbl').innerHTML='';d.forEach((row,ri)=>{const tr=$('eTbl').insertRow();row.forEach(cell=>{const td=tr.insertCell();if(ri===0)td.className='th';const inp=document.createElement('input');inp.value=cell;td.appendChild(inp);});});}
function tblReset(){$('eTbl').innerHTML=`<tr><td class="th"><input value="항목"></td><td class="th"><input value="내용"></td></tr><tr><td><input placeholder="..."></td><td><input placeholder="..."></td></tr>`;}
function tR(){const t=$('eTbl');const cols=t.rows[0]?.cells.length||2;const tr=t.insertRow();for(let i=0;i<cols;i++){const td=tr.insertCell();const inp=document.createElement('input');inp.placeholder='...';td.appendChild(inp);}}
function tC(){const t=$('eTbl');Array.from(t.rows).forEach((r,i)=>{const td=r.insertCell();const inp=document.createElement('input');inp.placeholder=i===0?'헤더':'...';if(i===0)td.className='th';td.appendChild(inp);});}
function tDR(){const t=$('eTbl');if(t.rows.length>1)t.deleteRow(t.rows.length-1);}
function tDC(){const t=$('eTbl');Array.from(t.rows).forEach(r=>{if(r.cells.length>1)r.deleteCell(r.cells.length-1);});}
function switchTab(tab){['text','table','img'].forEach(t=>{const b=$('mt-'+t);const c=$('tc-'+t);if(b){b.className='m-tab'+(t===tab?' on':'');b.dataset.tab=t;}if(c)c.className='tc'+(t===tab?' on':'');});}

// ════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════
function syncDC(){
  const fw=$('cw').querySelector('.cimg img');
  const dc=DC();
  if(!fw){return;}
  const iw=fw.offsetWidth||fw.naturalWidth;
  const ih=fw.offsetHeight||fw.naturalHeight;
  if(!iw||!ih)return;
  if(dc.width!==iw||dc.height!==ih){
    const saved=dc.width>0?dc.toDataURL():null;
    dc.width=iw;dc.height=ih;
    if(saved){const t=new Image();t.onload=()=>CTX().drawImage(t,0,0,iw,ih);t.src=saved;}
  }
}
function restoreDraw(url){
  if(!url)return;const dc=DC();const t=new Image();
  t.onload=()=>CTX().drawImage(t,0,0,dc.width,dc.height);t.src=url;
}
function pushDH(){const dc=DC();dHistory.push(CTX().getImageData(0,0,dc.width,dc.height));if(dHistory.length>40)dHistory.shift();}
function saveDraw(){const p=ST.pages[ST.cur];if(!p)return;const dc=DC();p.drawData=dc.width>0?dc.toDataURL():null;save();}
function getP(e){const dc=DC();const r=dc.getBoundingClientRect();const sx=dc.width/r.width,sy=dc.height/r.height;return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
function setupDraw(){
  const dc=DC();
  dc.addEventListener('pointerdown',e=>{
    if(mode!=='draw')return;e.preventDefault();
    dc.setPointerCapture(e.pointerId);
    syncDC();pushDH();drawing=true;lastP=getP(e);
  });
  dc.addEventListener('pointermove',e=>{
    if(!drawing||mode!=='draw')return;e.preventDefault();
    const pt=getP(e),ctx=CTX();
    if(eraser){ctx.clearRect(pt.x-drawSize,pt.y-drawSize,drawSize*2,drawSize*2);}
    else{
      const pres=e.pressure>0?e.pressure:1;
      ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor;
      ctx.lineWidth=drawSize*(0.5+pres*0.8);ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(lastP.x,lastP.y);ctx.lineTo(pt.x,pt.y);ctx.stroke();
    }
    lastP=pt;
  });
  const end=()=>{if(!drawing)return;drawing=false;lastP=null;saveDraw();};
  dc.addEventListener('pointerup',end);dc.addEventListener('pointerleave',end);dc.addEventListener('pointercancel',end);
  dc.addEventListener('touchstart',e=>{if(mode==='draw')e.preventDefault();},{passive:false});
  dc.addEventListener('touchmove',e=>{if(mode==='draw')e.preventDefault();},{passive:false});
}
function setDC(color,i){drawColor=color;eraser=false;for(let j=0;j<6;j++){const el=$('c'+j);if(el)el.classList.toggle('on',j===i);}$('sEr').classList.remove('on');}
function setDS(size,i){drawSize=size;eraser=false;for(let j=0;j<4;j++){const el=$('s'+j);if(el)el.classList.toggle('on',j===i);}$('sEr').classList.remove('on');}
function setEraser(){eraser=true;drawSize=20;for(let j=0;j<4;j++){const el=$('s'+j);if(el)el.classList.remove('on');}$('sEr').classList.add('on');}
function undoDraw(){if(!dHistory.length)return;CTX().putImageData(dHistory.pop(),0,0);saveDraw();toast('실행 취소');}
function clearDraw(){if(!confirm('모든 필기를 지우시겠습니까?'))return;dHistory=[];const dc=DC();CTX().clearRect(0,0,dc.width,dc.height);const p=ST.pages[ST.cur];if(p){p.drawData=null;save();}toast('필기 전체 삭제');}

function exportData(){const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ata_study_data.json';a.click();toast('데이터를 내보냈습니다');}
function importData(){$('importFile').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d&&Array.isArray(d.pages)){
        ST=d;if(!ST.folders)ST.folders=[];
        // migrate
        ST.pages.forEach(p=>{
          if(!p.images)p.images=[];
          if(p.imgData&&p.images.length===0){p.images=[{id:Date.now()+Math.random(),data:p.imgData,x:0,y:0,w:p.imgW||600,zIndex:0}];delete p.imgData;delete p.imgW;}
          if(!p.tboxes)p.tboxes=[];
        });
        save();renderPages();
        if(ST.pages.length>0)loadPage(ST.cur>=0?ST.cur:0);
        else{showEmpty();renderEmptyHS();}
        toast('데이터를 불러왔습니다');
      }else toast('올바른 파일 형식이 아닙니다');
    }catch{toast('파일을 읽을 수 없습니다');}
  };
  r.readAsText(file);e.target.value='';
}

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeEdit();closeView();closeAdd();closeAllPanels();closePageEdit();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){undoDraw();return;}
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const map={e:'edit',v:'view',d:'draw',t:'text',m:'move',z:'imgresize'};
  if(map[e.key])setMode(map[e.key]);
});
$('dlgInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
$('peNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmPageEdit();});

init();
</script>
