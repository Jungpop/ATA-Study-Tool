// 현재 그리기 대상 canvas & context 반환
function dTarget(){
  if(dTargetId && dTargetId!=='bg'){
    const el=CV().querySelector(`.ci-dl[data-imid="${dTargetId}"]`);
    if(el) return {canvas:el, ctx:el.getContext('2d')};
  }
  return {canvas:DL(), ctx:CTX()};
}

// 모든 이미지 ci-dl 동기화 (페이지 로드 시)
function syncDL(page){
  // 배경 #dl
  const dl=DL();
  const W=cvW(), H=cvH();
  if(W===0||H===0)return;
  if(dl.width!==W||dl.height!==H){dl.width=W;dl.height=H;}
  dl.style.cssText=`position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:5;pointer-events:none;display:none;`;
  if(page&&page.drawData){
    dl.style.display='block';
    const img=new Image();
    img.onload=()=>CTX().drawImage(img,0,0,W,H);
    img.src=page.drawData;
  }
  // 각 이미지 ci-dl
  if(!page)return;
  page.images.forEach(im=>{
    const ciDl=CV().querySelector(`.ci-dl[data-imid="${im.id}"]`);
    if(!ciDl)return;
    const wrap=ciDl.closest('.ci');
    if(!wrap)return;
    const iw=wrap.offsetWidth, ih=wrap.offsetHeight;
    if(iw===0||ih===0)return;
    ciDl.width=iw; ciDl.height=ih;
    if(im.drawData){
      ciDl.classList.add('has-data');
      const dimg=new Image();
      dimg.onload=()=>ciDl.getContext('2d').drawImage(dimg,0,0,iw,ih);
      dimg.src=im.drawData;
    }else{
      ciDl.classList.remove('has-data');
    }
  });
}

function saveDraw(){
  const p=ST.pages[ST.cur];if(!p)return;
  // 배경 저장
  const dl=DL();
  p.drawData=(dl.width>0&&dl.style.display!=='none')?dl.toDataURL():null;
  // 각 이미지 필기 저장
  CV().querySelectorAll('.ci-dl').forEach(ciDl=>{
    const imid=ciDl.dataset.imid;
    const im=p.images.find(x=>String(x.id)===String(imid));
    if(!im)return;
    im.drawData=(ciDl.width>0&&ciDl.classList.contains('has-data'))?ciDl.toDataURL():null;
  });
  save();
}

function initDrawEvents(){
  const cv=CV();

  cv.addEventListener('pointerdown',e=>{
    if(mode!=='draw')return;
    e.preventDefault();

    // 터치 시작 위치로 hit-test → 그리기 대상 결정
    const pt=cvPt(e.clientX,e.clientY);
    const p=ST.pages[ST.cur];
    let hitImgId=null;
    if(p&&p.images.length){
      const W=cvW(),H=cvH();
      // z-index 높은 순(배열 역순)으로 판별
      const hitIm=[...p.images].reverse().find(im=>{
        const ix=im.x*W/100,iy=im.y*H/100,iw=im.w*W/100,ih=im.h*H/100;
        return pt.x>=ix&&pt.x<=ix+iw&&pt.y>=iy&&pt.y<=iy+ih;
      });
      if(hitIm) hitImgId=hitIm.id;
    }
    dTargetId = hitImgId ? String(hitImgId) : 'bg';

    // 대상 canvas 준비
    const {canvas, ctx}=dTarget();

    // ci-dl 크기 초기화 (처음 그릴 때)
    if(dTargetId!=='bg'){
      const wrap=canvas.closest('.ci');
      if(wrap&&canvas.width===0){
        canvas.width=wrap.offsetWidth;
        canvas.height=wrap.offsetHeight;
      }
      canvas.classList.add('draw-active');
    }else{
      const W=cvW(),H=cvH();
      if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
      canvas.style.display='block';
    }

    // 히스토리 저장
    const hist=dHist.get(dTargetId)||[];
    hist.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    if(hist.length>40)hist.shift();
    dHist.set(dTargetId,hist);

    canvas.setPointerCapture(e.pointerId);
    dOn=true;
    dLast=dPtFor(e, canvas);
  },{passive:false});

  cv.addEventListener('pointermove',e=>{
    if(!dOn||mode!=='draw')return;
    e.preventDefault();
    const {canvas, ctx}=dTarget();
    const p2=dPtFor(e, canvas);

    // 경계 클리핑: canvas 크기 내로 제한
    const cx=Math.max(0,Math.min(canvas.width,p2.x));
    const cy=Math.max(0,Math.min(canvas.height,p2.y));
    const lx=Math.max(0,Math.min(canvas.width,dLast.x));
    const ly=Math.max(0,Math.min(canvas.height,dLast.y));

    if(dEr){
      ctx.clearRect(cx-dSz,cy-dSz,dSz*2,dSz*2);
    }else{
      const pr=e.pressure>0?e.pressure:1;
      ctx.globalCompositeOperation='source-over';
      ctx.strokeStyle=dCol;ctx.lineWidth=dSz*(0.5+pr*0.8);
      ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(cx,cy);ctx.stroke();
      if(dTargetId!=='bg'){
        canvas.classList.add('has-data');
      }
    }
    dLast=p2;
  },{passive:false});

  const dEnd=()=>{
    if(!dOn)return;
    dOn=false;dLast=null;
    // draw-active 해제
    if(dTargetId!=='bg'){
      const {canvas}=dTarget();
      canvas.classList.remove('draw-active');
    }
    saveDraw();
    dTargetId=null;
  };
  cv.addEventListener('pointerup',dEnd);
  cv.addEventListener('pointercancel',dEnd);
  cv.addEventListener('touchstart',e=>{if(mode==='draw')e.preventDefault();},{passive:false});
  cv.addEventListener('touchmove', e=>{if(mode==='draw')e.preventDefault();},{passive:false});
}

// 대상 canvas 기준 좌표 변환
function dPtFor(e, canvas){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width;
  const scaleY=canvas.height/r.height;
  return{x:(e.clientX-r.left)*scaleX, y:(e.clientY-r.top)*scaleY};
}

function dlPt(e){
  const dl=DL(),r=dl.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(dl.width/r.width),y:(e.clientY-r.top)*(dl.height/r.height)};
}

function setDC(c,i){dCol=c;dEr=false;for(let j=0;j<6;j++){const b=$('c'+j);if(b)b.classList.toggle('on',j===i);}$('sEr').classList.remove('on');}
function setDS(s,i){dSz=s;dEr=false;for(let j=0;j<4;j++){const b=$('s'+j);if(b)b.classList.toggle('on',j===i);}$('sEr').classList.remove('on');}
function setEraser(){dEr=true;dSz=20;for(let j=0;j<4;j++){const b=$('s'+j);if(b)b.classList.remove('on');}$('sEr').classList.add('on');}

function undoDraw(){
  // 마지막으로 그린 대상의 히스토리 복원
  // draw 모드 아닐 때는 가장 최근 히스토리가 있는 대상에서 복원
  let targetId=dTargetId;
  if(!targetId){
    // 가장 최근 히스토리 찾기
    let lastTarget=null, lastLen=-1;
    dHist.forEach((hist,id)=>{if(hist.length>lastLen){lastLen=hist.length;lastTarget=id;}});
    targetId=lastTarget;
  }
  if(!targetId)return;
  const hist=dHist.get(targetId);
  if(!hist||!hist.length){toast('취소할 내용 없음');return;}

  let canvas, ctx;
  if(targetId==='bg'){
    canvas=DL(); ctx=CTX();
  }else{
    canvas=CV().querySelector(`.ci-dl[data-imid="${targetId}"]`);
    if(!canvas)return;
    ctx=canvas.getContext('2d');
  }
  ctx.putImageData(hist.pop(),0,0);
  if(hist.length===0&&targetId!=='bg') canvas.classList.remove('has-data');
  saveDraw();
  toast('실행 취소');
}

function clearDraw(){
  if(!confirm('모든 필기를 지우시겠습니까?'))return;
  // 배경 필기 초기화
  const dl=DL();
  CTX().clearRect(0,0,dl.width,dl.height);
  if(mode!=='draw') dl.style.display='none';
  // 모든 이미지 필기 초기화
  CV().querySelectorAll('.ci-dl').forEach(ciDl=>{
    ciDl.getContext('2d').clearRect(0,0,ciDl.width,ciDl.height);
    ciDl.classList.remove('has-data','draw-active');
    ciDl.style.display='none';
  });
  dHist.clear();
  const p=ST.pages[ST.cur];
  if(p){
    p.drawData=null;
    p.images.forEach(im=>{ im.drawData=null; });
    save();
  }
  toast('필기 삭제됨');
}

function triggerImg(){
  if(ST.cur<0){toast('페이지를 먼저 만드세요');return;}

function loadImg(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  if(ST.cur===-1){toast('페이지를 먼저 만드세요');return;}
  const page=ST.pages[ST.cur];if(!page.images)page.images=[];
  let done=0;
  files.forEach((file,fi)=>{
    const r=new FileReader();
    r.onload=ev=>{
      const imgEl=new Image();
      imgEl.onload=()=>{
        const W=cvW(),H=cvH();
        const maxW=W*0.70, maxH=H*0.70;
        const scale=Math.min(maxW/imgEl.naturalWidth, maxH/imgEl.naturalHeight, 1);
        const iw=imgEl.naturalWidth*scale, ih=imgEl.naturalHeight*scale;
        const offset=fi*3;
        const px=Math.max(0,(W-iw)/2/W*100+offset);
        const py=Math.max(0,(H-ih)/2/H*100+offset);
        page.images.push({id:Date.now()+fi+Math.random(),data:ev.target.result,
          x:px,y:py,w:iw/W*100,h:ih/H*100,drawData:null});
        done++;
        if(done===files.length){save();loadPage(ST.cur);toast(`이미지 ${files.length}장 추가됨`);}
      };
      imgEl.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
  e.target.value='';
}

// ── HS LIST D&D (롱프레스 1초 후 활성) ───────
function initHSDnD(container){
  let dragEl=null,dragId=null,isDragging=false;
  let longPressTimer=null;

  function cancelLongPress(){clearTimeout(longPressTimer);longPressTimer=null;}
  function resetState(el){
    if(el){el.classList.remove('dragging','drag-ready');}
    container.querySelectorAll('.hsc').forEach(e=>e.classList.remove('drag-over'));
    dragEl=null;dragId=null;isDragging=false;
  }

  container.querySelectorAll('.hsc').forEach(item=>{
    item.addEventListener('pointerdown',e=>{
      if(e.target.closest('.hsc-del'))return;
      cancelLongPress();
      dragEl=item;dragId=parseInt(item.dataset.hsid);isDragging=false;
      item.classList.add('drag-ready');
      longPressTimer=setTimeout(()=>{
        isDragging=true;
        item.classList.remove('drag-ready');
        item.classList.add('dragging');
        try{item.setPointerCapture(e.pointerId);}catch(err){}
        toast('드래그 모드 활성');
      },900);
    });

    item.addEventListener('pointermove',e=>{
      if(!isDragging||!dragEl)return;
      e.preventDefault();
      // 기존 인디케이터 제거
      container.querySelectorAll('.drop-indicator').forEach(x=>x.remove());
      container.querySelectorAll('.hsc').forEach(el=>el.classList.remove('drag-over'));
      const els=Array.from(container.querySelectorAll('.hsc:not(.dragging)'));
      let closest=null,closestDist=Infinity,closestAbove=true;
      els.forEach(el=>{
        const box=el.getBoundingClientRect();
        const mid=box.top+box.height/2;
        const dist=Math.abs(e.clientY-mid);
        if(dist<closestDist){closestDist=dist;closest=el;closestAbove=e.clientY<mid;}
      });
      if(closest){
        const ind=document.createElement('div');
        ind.className='drop-indicator';
        if(closestAbove) closest.parentNode.insertBefore(ind,closest);
        else closest.parentNode.insertBefore(ind,closest.nextSibling);
        closest.dataset.dropAbove=closestAbove?'1':'0';
        closest.classList.add('drag-over');
      }
    });

    item.addEventListener('pointerup',e=>{
      cancelLongPress();
      const wasDragging=isDragging;
      const savedId=dragId;
      // 인디케이터 제거
      container.querySelectorAll('.drop-indicator').forEach(x=>x.remove());
      if(wasDragging){
        const overEl=container.querySelector('.hsc.drag-over');
        if(overEl&&overEl!==dragEl){
          const p=ST.pages[ST.cur];
          if(p){
            const fromIdx=p.hotspots.findIndex(h=>h.id===savedId);
            const toId=parseInt(overEl.dataset.hsid);
            const insertBefore=overEl.dataset.dropAbove==='1';
            if(fromIdx!==-1){
              const[moved]=p.hotspots.splice(fromIdx,1);
              const newIdx=p.hotspots.findIndex(h=>h.id===toId);
              p.hotspots.splice(insertBefore?newIdx:newIdx+1,0,moved);
              renderHS(p);renderHSList(p);save();
              return;
            }
          }
        }
      }
      resetState(item);
      if(!wasDragging) hsClick(savedId);
    });

    item.addEventListener('pointercancel',()=>{cancelLongPress();resetState(item);});
    item.addEventListener('contextmenu',e=>e.preventDefault());
  });
}
function hsClick(id){closeAllPanels();if(mode==='view')openView(id);else if(mode==='edit')openEdit(id);}
function delHS(id){
  if(!confirm('삭제?'))return;
  const p=ST.pages[ST.cur];p.hotspots=p.hotspots.filter(h=>h.id!==id);
  renderHS(p);renderHSList(p);save();toast('메모 삭제됨');
}
function clearHotspots(){
  if(!confirm('모든 메모를 삭제하시겠습니까?'))return;
  const p=ST.pages[ST.cur];if(!p)return;
  p.hotspots=[];renderHS(p);renderHSList(p);save();toast('전체 삭제됨');
}

// ── ADD / PAGE EDIT ──────────────────────────
function startAdd(type,parentFid){
  closeAllPanels();addMode=type;
  if(type==='folder'){
    $('dlgTitle').textContent='📁 새 폴더';$('dlgSub').textContent='ATA 챕터별로 분류하세요';
    $('dlgInput').placeholder='예: ATA 21 – Air Conditioning';
    $('dlgFolderRow').style.display='none';
    // 상위폴더 선택
    const ps=$('dlgParent');ps.innerHTML='<option value="">── 최상위 폴더 ──</option>';
    function addFolderOpts(fid,depth){
      ST.folders.filter(f=>f.parentId==fid).forEach(f=>{
        ps.innerHTML+=`<option value="${f.id}">${'　'.repeat(depth)}📁 ${eh(f.name)}</option>`;
        addFolderOpts(f.id,depth+1);
      });
    }
    addFolderOpts(null,0);
    if(parentFid)ps.value=parentFid;
    $('dlgParentRow').style.display='flex';
  }else{
    $('dlgTitle').textContent='＋ 새 페이지';$('dlgSub').textContent='';
    $('dlgInput').placeholder='예: ATA 21-50 Cooling Schematic';
    $('dlgParentRow').style.display='none';
    const sel=$('dlgFolder');sel.innerHTML='<option value="">── 폴더 없음 ──</option>';
    function addFolderOpts2(fid,depth){
      ST.folders.filter(f=>f.parentId==fid).forEach(f=>{
        sel.innerHTML+=`<option value="${f.id}">${'　'.repeat(depth)}📁 ${eh(f.name)}</option>`;
        addFolderOpts2(f.id,depth+1);
      });
    }
    addFolderOpts2(null,0);
    if(ST.cur>=0&&ST.pages[ST.cur]?.folderId)sel.value=ST.pages[ST.cur].folderId;
    $('dlgFolderRow').style.display='flex';
  }
  $('dlgInput').value='';$('addDlg').style.display='flex';setTimeout(()=>$('dlgInput').focus(),80);
}
function closeAdd(){$('addDlg').style.display='none';}
function confirmAdd(){
  const input=$('dlgInput').value.trim();
  if(addMode==='folder'){
    // 이름 없으면 "새 폴더 N" 자동 생성
    const name=input||autoFolderName();
    const pid=$('dlgParent').value||null;
    ST.folders.push({id:Date.now(),name,open:true,parentId:pid?parseInt(pid):null});
    save();closeAdd();renderPages();toast('폴더 추가됨');
  }else{
    // 이름 없으면 "새 페이지 N" 자동 생성
    const name=input||autoPageName();
    ST.pages.push({id:Date.now(),folderId:$('dlgFolder').value||null,name,
      images:[],hotspots:[],drawData:null,tboxes:[]});
    save();closeAdd();renderPages();loadPage(ST.pages.length-1);
    updateToolbarDisabled();toast('페이지 추가됨');
  }
}

// 중복 없는 자동 이름 생성
function autoFolderName(){
  let n=1;
  const names=new Set(ST.folders.map(f=>f.name));
  while(names.has(`새 폴더 ${n}`)) n++;
  return `새 폴더 ${n}`;
}
function autoPageName(){
  let n=1;
  const names=new Set(ST.pages.map(p=>p.name));
  while(names.has(`새 페이지 ${n}`)) n++;
  return `새 페이지 ${n}`;
}
function openPageEdit(i){
  closeAllPanels();pageEditIdx=i;const p=ST.pages[i];
  $('peNameInput').value=p.name;
  const sel=$('peFolderSel');sel.innerHTML='<option value="">── 폴더 없음 ──</option>';
  function addOpts(fid,depth){
    ST.folders.filter(f=>f.parentId==fid).forEach(f=>{
      const opt=document.createElement('option');
      opt.value=f.id;opt.textContent='　'.repeat(depth)+'📁 '+f.name;
      if(p.folderId==f.id)opt.selected=true;
      sel.appendChild(opt);
      addOpts(f.id,depth+1);
    });
  }
  addOpts(null,0);
  $('pageEditDlg').style.display='flex';setTimeout(()=>$('peNameInput').focus(),80);
}
function closePageEdit(){$('pageEditDlg').style.display='none';pageEditIdx=-1;}
function confirmPageEdit(){
  if(pageEditIdx<0)return;const p=ST.pages[pageEditIdx];
  const n=$('peNameInput').value.trim();if(n)p.name=n;
  p.folderId=$('peFolderSel').value||null;
  save();renderPages();closePageEdit();toast('수정됨');
}

// ── TABLE ────────────────────────────────────
function tblGet(){const r=$('eTbl').rows;if(!r.length)return null;return Array.from(r).map(r=>Array.from(r.cells).map(c=>c.querySelector('input').value));}
function tblLoad(d){$('eTbl').innerHTML='';d.forEach((row,ri)=>{const tr=$('eTbl').insertRow();row.forEach(cell=>{const td=tr.insertCell();if(ri===0)td.className='th';const inp=document.createElement('input');inp.value=cell;td.appendChild(inp);});});}
function tblReset(){$('eTbl').innerHTML=`<tr><td class="th"><input value="항목"></td><td class="th"><input value="내용"></td></tr><tr><td><input placeholder="..."></td><td><input placeholder="..."></td></tr>`;}
function tR(){const t=$('eTbl');const c=t.rows[0]?.cells.length||2;const tr=t.insertRow();for(let i=0;i<c;i++){const td=tr.insertCell();const inp=document.createElement('input');inp.placeholder='...';td.appendChild(inp);}}
function tC(){const t=$('eTbl');Array.from(t.rows).forEach((r,i)=>{const td=r.insertCell();const inp=document.createElement('input');inp.placeholder=i===0?'헤더':'...';if(i===0)td.className='th';td.appendChild(inp);});}
function tDR(){const t=$('eTbl');if(t.rows.length>1)t.deleteRow(t.rows.length-1);}
function tDC(){const t=$('eTbl');Array.from(t.rows).forEach(r=>{if(r.cells.length>1)r.deleteCell(r.cells.length-1);});}
function switchTab(tab){['text','table','img'].forEach(t=>{const b=$('mt-'+t),c=$('tc-'+t);if(b){b.className='m-tab'+(t===tab?' on':'');b.dataset.tab=t;}if(c)c.className='tc'+(t===tab?' on':'');});}
function loadPopImg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{popImg=ev.target.result;const p=$('popPrev');p.src=popImg;p.style.display='block';};r.readAsDataURL(f);e.target.value='';}
function clearPopImg(){popImg=null;$('popPrev').src='';$('popPrev').style.display='none';}

// ── EXPORT / IMPORT ──────────────────────────
function exportData(){const b=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ata_study_data.json';a.click();toast('내보내기 완료');}
function importData(){$('importFile').click();}
function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d&&Array.isArray(d.pages)){
        ST=d;if(!ST.folders)ST.folders=[];
        ST.pages.forEach(p=>{
          if(!p.images)p.images=[];
          if(p.imgData&&!p.images.length){p.images=[{id:Date.now()+Math.random(),data:p.imgData,x:0,y:0,w:100,h:100}];delete p.imgData;delete p.imgW;}
          if(!p.tboxes)p.tboxes=[];if(!p.hotspots)p.hotspots=[];
        });
        save();renderPages();
        if(ST.pages.length>0)loadPage(ST.cur>=0?ST.cur:0);
        else{showEmpty();renderEmptyHS();}
        toast('불러오기 완료');
      }else toast('잘못된 파일 형식');
    }catch{toast('파일 읽기 실패');}
  };
  r.readAsText(f);e.target.value='';
}

// ── KEYBOARD ─────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeEdit();closeView();closeAdd();closeAllPanels();closePageEdit();
    if(mode==='add-hs'||mode==='add-tb') setMode('edit');
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){undoDraw();return;}
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const map={e:'edit',v:'view',d:'draw'};
  if(map[e.key])setMode(map[e.key]);
});
$('dlgInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
$('peNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmPageEdit();});

init();
</script>
