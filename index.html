<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06101e">
<title>ATA Study Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --bg:#06101e;--s1:#0b1828;--s2:#102030;--s3:#162840;
  --bd:#1c3050;--bdL:#254060;
  --ac:#0ea5e9;--acd:#0284c7;--gr:#10b981;--am:#f59e0b;--rd:#ef4444;
  --tx:#cbd5e1;--txm:#7a9ab8;--txs:#3d5878;--wh:#f8fafc;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --r:8px;--rs:5px;
  --sh:0 4px 24px rgba(0,0,0,.45);--shL:0 8px 40px rgba(0,0,0,.6);
  --hdr:52px;--tb:52px;--bnav:58px;
  --SL:248px;--SR:268px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans);
  overscroll-behavior:none;padding-top:var(--sat);padding-left:var(--sal);padding-right:var(--sar);}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--sans);-webkit-appearance:none;box-sizing:border-box;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

/* ── SHELL ── */
#shell{display:flex;flex-direction:column;height:100%;}

/* ── HEADER ── */
#hdr{height:var(--hdr);flex-shrink:0;background:linear-gradient(135deg,#06101e,#0b1c30);
  border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:200;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-t{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--gr));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-s{font-size:9px;color:var(--txs);letter-spacing:1.5px;font-family:var(--mono);}
#hdr-r{margin-left:auto;display:flex;align-items:center;gap:5px;}
.hb{height:32px;padding:0 10px;border-radius:var(--rs);border:1px solid var(--bd);color:var(--txm);
  font-size:11px;background:transparent;transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.hb:hover,.hb:active{border-color:var(--ac);color:var(--ac);background:rgba(14,165,233,.08);}
.hb.danger:hover,.hb.danger:active{border-color:var(--rd);color:var(--rd);}
.stgl{height:32px;width:32px;border-radius:var(--rs);border:1px solid var(--bd);color:var(--txm);
  font-size:13px;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stgl.on{background:rgba(14,165,233,.12);border-color:var(--ac);color:var(--ac);}
#menuBtn{display:none;width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);
  color:var(--txm);font-size:18px;background:transparent;align-items:center;justify-content:center;}

/* ── MAIN GRID ── */
#main{flex:1;display:grid;grid-template-columns:var(--SL) 1fr var(--SR);overflow:hidden;min-height:0;
  transition:grid-template-columns .28s cubic-bezier(.4,0,.2,1);}
#main.hL{grid-template-columns:0 1fr var(--SR);}
#main.hR{grid-template-columns:var(--SL) 1fr 0;}
#main.hL.hR{grid-template-columns:0 1fr 0;}

/* ── SIDEBARS ── */
#sideL{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;}
#sideL.col{transform:translateX(-100%);opacity:0;pointer-events:none;}
#sideR{background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;}
#sideR.col{transform:translateX(100%);opacity:0;pointer-events:none;}
.side-hdr{padding:10px 12px;font-size:9px;font-family:var(--mono);color:var(--txs);letter-spacing:2px;
  border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sbadge{background:var(--ac);color:#000;font-size:8px;font-family:var(--mono);font-weight:700;padding:1px 6px;border-radius:10px;}
#pageList{flex:1;overflow-y:auto;padding:5px;overscroll-behavior:contain;}
.folder{margin-bottom:2px;}
.fhdr{display:flex;align-items:center;gap:6px;padding:8px 9px;border-radius:var(--r);border:1px solid transparent;
  background:var(--s2);cursor:default;min-height:42px;}
.fhdr:active{border-color:var(--am);}
.fhdr .farr{cursor:pointer;}
.fhdr .fname{cursor:text;}
.fhdr:hover .fdel,.fhdr:active .fdel{opacity:1;}
.farr{font-size:9px;color:var(--txs);transition:transform .2s;flex-shrink:0;}
.farr.op{transform:rotate(90deg);}
.fname{font-size:12px;font-weight:600;color:var(--am);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fcnt{font-size:9px;font-family:var(--mono);color:var(--txs);flex-shrink:0;}
.fdel{width:24px;height:24px;border-radius:4px;color:var(--txs);font-size:15px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;opacity:0;}
.fhdr:hover .fdel,.fhdr:active .fdel{opacity:1;}
.fdel:active{color:var(--rd);}
.fpages{overflow:hidden;transition:max-height .22s ease;padding-left:10px;}
.pitem{display:flex;align-items:center;gap:5px;padding:8px 9px;border-radius:var(--rs);border:1px solid transparent;
  cursor:pointer;margin-bottom:2px;min-height:40px;}
.pitem:active{background:var(--s2);}
.pitem.sel{background:rgba(14,165,233,.1);border-color:rgba(14,165,233,.4);}
.pname{font-size:12px;font-weight:500;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pitem.sel .pname{color:var(--ac);}
.pcnt{font-size:9px;font-family:var(--mono);color:var(--txs);flex-shrink:0;}
.pdel,.fdel-btn{width:24px;height:24px;border-radius:4px;font-size:14px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;opacity:0;color:var(--txs);}
.pitem:hover .pdel,.pitem:active .pdel{opacity:1;}
.pdel:active{color:var(--rd);}
/* 인라인 이름 편집 */
.inline-edit{background:transparent;border:none;border-bottom:1px solid var(--ac);color:var(--wh);
  font-size:12px;font-weight:500;font-family:var(--sans);outline:none;width:100%;min-width:60px;padding:1px 2px;}
.fname.editing,.pname.editing{overflow:visible;}
.uncat{padding:5px 7px 2px;font-size:9px;color:var(--txs);font-family:var(--mono);letter-spacing:1.5px;}
.drag-handle{
  font-size:13px;color:var(--txs);cursor:grab;flex-shrink:0;
  padding:0 4px;touch-action:none;user-select:none;-webkit-user-select:none;
  opacity:0;transition:opacity .15s;
}
.fhdr:hover .drag-handle,.fhdr:active .drag-handle,
.pitem:hover .drag-handle,.pitem:active .drag-handle{opacity:1;}
/* 폴더/페이지 D&D */
.folder{touch-action:none;user-select:none;-webkit-user-select:none;}
.pitem{touch-action:none;user-select:none;-webkit-user-select:none;}
.fhdr{touch-action:none;user-select:none;-webkit-user-select:none;}
/* 인라인 편집 input은 touch-action 복원 */
.fname input,.pname input,.inline-edit{touch-action:auto!important;user-select:text!important;-webkit-user-select:text!important;}
.folder.dragging,.pitem.dragging{opacity:.4;background:var(--s3);}
.folder.drag-over-top,.pitem.drag-over-top{border-top:2px solid var(--ac);}
.folder.drag-over-bot,.pitem.drag-over-bot{border-bottom:2px solid var(--ac);}
.folder.drag-over-into{outline:1px dashed var(--ac);background:rgba(14,165,233,.06);}
@keyframes lp-pulse{0%{box-shadow:0 0 0 0 rgba(14,165,233,.5);}70%{box-shadow:0 0 0 6px rgba(14,165,233,0);}100%{box-shadow:0 0 0 0 rgba(14,165,233,0);}}
.folder.drag-ready .fhdr,.pitem.drag-ready{border-color:rgba(14,165,233,.5)!important;animation:lp-pulse .9s ease-out;}
/* 하위폴더 */
.subfolder{padding-left:14px;}
.subfolder .fname{color:var(--ac);}
#addArea{padding:6px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.abtn{width:100%;padding:9px;border-radius:var(--r);border:1px dashed var(--bd);color:var(--txs);font-size:12px;
  background:transparent;display:flex;align-items:center;justify-content:center;gap:5px;min-height:42px;}
.abtn:active{border-color:var(--ac);color:var(--ac);}
.abtn.fa:active{border-color:var(--am);color:var(--am);}

/* ── CENTER ── */
#center{display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);position:relative;}

/* 블러 오버레이 */
#cwBlur{position:absolute;inset:0;z-index:90;background:rgba(6,16,30,.48);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  pointer-events:none;opacity:0;transition:opacity .28s cubic-bezier(.4,0,.2,1);}
#cwBlur.on{opacity:1;pointer-events:all;}

/* ══════════════════════════════════════════
   CANVAS AREA & THE CANVAS
   
   #canvasArea : overflow:hidden — 절대 스크롤 없음
   #cv         : canvasArea를 꽉 채움, position:relative
                 모든 좌표의 단일 기준점
   
   레이어 순서 (z-index):
     이미지(.ci)   : 10
     드로잉(#dl)   : 20  ← canvas 엘리먼트
     핫스팟(.hs)   : 30
     텍스트박스(.tb): 40
══════════════════════════════════════════ */
#canvasArea{
  flex:1;
  overflow:hidden;
  background:radial-gradient(ellipse at 50% 30%,#0b1c30,#06101e);
  padding:16px;
  display:flex;
  align-items:stretch;
  justify-content:stretch;
}

#cv{
  position:relative;
  width:100%;
  height:100%;
  background:#040a14;
  border-radius:6px;
  box-shadow:0 0 0 1px var(--bd), var(--sh);
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none;
}

/* 빈 상태 */
#emptyState{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;cursor:pointer;text-align:center;padding:40px;z-index:1;}
.ei{font-size:46px;}.et{font-size:16px;font-weight:500;color:var(--tx);}
.es{font-size:12px;color:var(--txm);}
.ecta{margin-top:4px;padding:10px 22px;background:var(--ac);color:#000;font-size:13px;font-weight:700;border-radius:var(--r);}

/* 이미지 레이어 z:10 */
.ci{
  position:absolute;
  z-index:10;
  user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none; /* iOS 롱프레스 팝업 차단 */
  touch-action:none;
}
.ci img{display:block;width:100%;height:100%;pointer-events:none;border-radius:2px;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
/* 이미지 종속 필기 canvas */
.ci-dl{
  position:absolute;left:0;top:0;
  width:100%;height:100%;
  pointer-events:none;
  display:none;
  z-index:1; /* .ci 내부 — 이미지 img(z:auto) 위, 리사이즈핸들 아래 */
}
/* draw 모드에서만 pointer-events 활성 (현재 그리기 대상만) */
.ci-dl.draw-active{pointer-events:all;cursor:crosshair;display:block;}
/* 내용 있으면 항상 표시 */
.ci-dl.has-data{display:block;}

/* 이미지 리사이즈 핸들 */
.ci-rh{position:absolute;bottom:-7px;right:-7px;width:18px;height:18px;border-radius:3px;
  background:var(--gr);border:2px solid var(--bg);cursor:se-resize;
  display:none;z-index:5;touch-action:none;}

/* edit 모드: 이미지 이동 + 리사이즈 통합 (move 흡수) */
#cv.m-edit .ci{cursor:grab;pointer-events:all;}
#cv.m-edit .ci:active{cursor:grabbing;}
#cv.m-edit .ci-rh{display:block;}
/* 선택된 이미지 하이라이트 */
.ci.img-selected{outline:2px solid var(--ac);outline-offset:1px;}
.ci.img-selected .ci-rh{display:block;}
/* add-hs 모드: 이미지 위 커서를 십자로 */
#cv.m-add-hs .ci{cursor:crosshair;pointer-events:all;}
#cv.m-add-hs .ci-rh{display:none;}
/* 나머지 모드: 이미지는 배경 — 클릭 통과 */
#cv.m-view .ci,
#cv.m-draw .ci,
#cv.m-add-tb .ci{pointer-events:none;}

/* 배경 필기 레이어 — 이미지보다 아래 */
#dl{
  position:absolute;left:0;top:0;
  z-index:5;
  pointer-events:none;
  display:none;
}
/* draw 모드: #cv 자체가 포인터 이벤트 수신 (hit-test 후 ci-dl 또는 #dl에 위임) */
#cv.m-draw{cursor:crosshair;}
#cv.m-draw #dl{display:block;}
/* draw 모드 아닐 때도 필기 내용 보여줌 */
#cv.m-view #dl,
#cv.m-edit #dl,
#cv.m-add-hs #dl,
#cv.m-add-tb #dl{pointer-events:none;}

/* 메모 배지 — z-index는 JS에서 이미지 레이어 기반으로 동적 설정 */
.hs{
  position:absolute;
  width:32px;height:32px;
  transform:translate(-50%,-50%);
  cursor:pointer;
}
#cv.m-draw .hs,
#cv.m-add-hs .hs,
#cv.m-add-tb .hs{pointer-events:none;}
.hs-badge{
  width:32px;height:32px;border-radius:50%;
  background:var(--ac);
  border:2.5px solid rgba(255,255,255,.85);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  transition:transform .15s,box-shadow .15s;
}
.hs:hover .hs-badge,.hs:active .hs-badge{
  transform:scale(1.18);
  box-shadow:0 4px 14px rgba(14,165,233,.6);
}
.hs-badge-num{
  font-size:12px;font-family:var(--mono);font-weight:700;
  color:#fff;pointer-events:none;line-height:1;
  user-select:none;-webkit-user-select:none;
}
.hs{
  user-select:none;-webkit-user-select:none;
  touch-action:none;
}
.hs-tip{
  position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
  background:rgba(11,24,40,.92);border:1px solid var(--bdL);
  color:var(--wh);font-size:10px;font-family:var(--sans);font-weight:500;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.hs:hover .hs-tip{opacity:1;}
.hs-del{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:var(--rd);color:#fff;font-size:11px;font-weight:700;
  border:2px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  opacity:0;cursor:pointer;z-index:5;
  transition:opacity .15s;
}
/* 삭제 버튼은 숨김 — 3초 롱프레스로 삭제 */
.hs-del{display:none!important;}
/* 메모 상태별 스타일 */
@keyframes hs-lp-pulse{0%{box-shadow:0 0 0 0 rgba(14,165,233,.6);}70%{box-shadow:0 0 0 8px rgba(14,165,233,0);}100%{box-shadow:0 0 0 0 rgba(14,165,233,0);}}
@keyframes hs-del-pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.7);}70%{box-shadow:0 0 0 10px rgba(239,68,68,0);}100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}}
/* 크기 변경 중 */
.hs.hs-resizing{cursor:nwse-resize;}
.hs.hs-resizing .hs-badge{box-shadow:0 4px 14px rgba(16,185,129,.6);}
/* 이동 준비(1초) */
.hs.hs-ready .hs-badge{animation:hs-lp-pulse .9s ease-out;}
/* 이동 중 — 모든 이미지/메모 위로 */
.hs.hs-dragging{opacity:.75;z-index:199!important;}
.hs.hs-dragging .hs-badge{box-shadow:0 6px 20px rgba(14,165,233,.7);transform:scale(1.15);}
/* 삭제 대기(3초) */
.hs.hs-delwarn .hs-badge{animation:hs-del-pulse .6s ease-out infinite;background:var(--rd);}

/* 텍스트박스 — 필기 위 최상단 */
.tb{position:absolute;z-index:300;min-width:60px;}
.tb textarea{display:block;width:100%;min-height:34px;background:rgba(6,16,30,.82);
  border:1.5px solid rgba(16,185,129,.6);border-radius:5px;color:#fff;font-size:14px;
  font-family:var(--sans);padding:7px 9px;resize:none;outline:none;line-height:1.6;
  overflow:hidden;}
.tb textarea:focus{border-color:var(--gr);}
.tb textarea::placeholder{color:rgba(255,255,255,.25);}
/* 완료 상태 — 드래그 가능, 텍스트 선택/롱프레스 팝업 차단 */
.tb.done{
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  touch-action:none; /* iOS가 스크롤 제스처로 pointercancel 보내는 것 차단 */
}
.tb.done textarea{border-color:rgba(16,185,129,.2);background:rgba(6,16,30,.6);cursor:default;resize:none;
  user-select:none;-webkit-user-select:none;pointer-events:none;}
/* D&D 이동 중 */
.tb.tb-dragging{opacity:.6;outline:2px solid var(--ac);border-radius:5px;}
/* 롱프레스 준비 */
@keyframes tb-lp-pulse{0%{box-shadow:0 0 0 0 rgba(14,165,233,.5);}70%{box-shadow:0 0 0 6px rgba(14,165,233,0);}100%{box-shadow:0 0 0 0 rgba(14,165,233,0);}}
.tb.tb-ready{outline:1px solid rgba(14,165,233,.5);border-radius:5px;animation:tb-lp-pulse .9s ease-out;}
/* 너비 조절 핸들 (우측 중간) — 편집 중일 때만 표시 */
.tb-rh-r{position:absolute;top:50%;right:-8px;transform:translateY(-50%);
  width:16px;height:32px;border-radius:4px;background:var(--gr);border:2px solid var(--bg);
  cursor:ew-resize;z-index:5;opacity:0;touch-action:none;}
.tb:not(.done):hover .tb-rh-r,.tb:focus-within .tb-rh-r{opacity:1;}
/* view/draw 모드: 텍스트박스 비활성 */
#cv.m-view .tb{pointer-events:none;}
#cv.m-view .tb textarea{background:rgba(6,16,30,.6);}
#cv.m-draw .tb{pointer-events:none;}
/* edit 모드: 텍스트박스 완전 활성 (이동 + 편집 모두) */
#cv.m-edit .tb{pointer-events:all;}
#cv.m-edit .tb textarea{pointer-events:all;}
/* edit 모드 + done 상태: textarea는 pointer-events 차단 유지 → wrap이 이벤트 받아 D&D 가능 */
#cv.m-edit .tb.done textarea{pointer-events:none;}
/* add-hs / add-tb 모드: 텍스트박스 비활성 */
#cv.m-add-hs .tb{pointer-events:none;}
#cv.m-add-tb .tb{pointer-events:none;}

/* ── 드롭 위치 인디케이터 ── */
.drop-indicator{
  position:relative;height:0;margin:0;
  pointer-events:none;overflow:visible;
}
.drop-indicator::before{
  content:'';position:absolute;left:4px;right:4px;top:-1.5px;
  height:3px;background:var(--ac);border-radius:3px;
  box-shadow:0 0 6px rgba(14,165,233,.6);
}
/* 폴더 into 강조 */
.fhdr.drag-over-into{
  background:rgba(14,165,233,.15)!important;
  outline:2px dashed var(--ac)!important;
  border-radius:var(--r);
}
/* 드래그 중 요소 */
.folder.dragging,.pitem.dragging,.hsc.dragging{
  opacity:.35;background:var(--s3);
}
.folder.drag-ready .fhdr,.pitem.drag-ready,.hsc.drag-ready{
  border-color:rgba(14,165,233,.5)!important;
  animation:lp-pulse .9s ease-out;
}

/* ── 휴지통 floating ghost ── */
#trashGhost{
  position:fixed;pointer-events:none;z-index:9999;
  opacity:0;transform:scale(0.85);
  transition:opacity .15s, transform .15s;
  border-radius:var(--r);overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  outline:2px solid var(--rd);
  max-width:120px;max-height:80px;
}
#trashGhost.show{opacity:.75;transform:scale(1);}
/* 휴지통 아이콘 강조 */
#trashZoneInner.over{
  animation:trash-pulse .4s ease-out infinite alternate;
}
@keyframes trash-pulse{
  from{color:var(--rd);transform:scale(1);}
  to{color:#ff8080;transform:scale(1.08);}
}
/* 휴지통 존 전환 */
#tb.trash-zone{background:rgba(239,68,68,.12)!important;border-top-color:rgba(239,68,68,.4)!important;transition:background .2s,border-top-color .2s;}
#tb.trash-zone-over{background:rgba(239,68,68,.28)!important;border-top-color:var(--rd)!important;}
#trashZoneInner{display:none;align-items:center;justify-content:center;gap:8px;
  font-size:14px;color:var(--rd);font-weight:600;width:100%;}
#trashZoneInner.show{display:flex;}
/* 드래그 중 요소 */
.dragging-to-trash{opacity:.55!important;outline:2px solid var(--rd)!important;border-radius:5px;}
#tb{height:var(--tb);flex-shrink:0;background:var(--s1);border-top:1px solid var(--bd);
  display:flex;align-items:center;padding:0 10px;gap:5px;overflow-x:auto;scrollbar-width:none;}
#tb::-webkit-scrollbar{display:none;}
.tbtn{height:36px;padding:0 11px;border-radius:var(--r);border:1px solid var(--bd);color:var(--txm);
  font-size:12px;background:transparent;transition:all .15s;display:flex;align-items:center;gap:4px;
  white-space:nowrap;flex-shrink:0;}
.tbtn:hover,.tbtn:active{border-color:var(--ac);color:var(--ac);background:rgba(14,165,233,.08);}
.tbtn.on{background:rgba(14,165,233,.12);border-color:var(--ac);color:var(--ac);}
.tbtn.del{color:var(--txs);}
.tbtn.del:hover,.tbtn.del:active{border-color:var(--rd);color:var(--rd);}
.tsep{width:1px;height:22px;background:var(--bd);flex-shrink:0;margin:0 2px;}
.ttip{font-size:10px;color:var(--txs);font-family:var(--mono);white-space:nowrap;padding:0 4px;}
#drawCtrl{display:none;align-items:center;gap:5px;flex-shrink:0;}
#drawCtrl.show{display:flex;}
.dcsep{width:1px;height:18px;background:var(--bd);flex-shrink:0;}
.dcl{font-size:9px;color:var(--txs);font-family:var(--mono);}
.cc{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.cc.on{border-color:#fff;transform:scale(1.18);}
.szb{width:30px;height:30px;border-radius:4px;border:1px solid var(--bd);background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.szb.on{border-color:var(--ac);background:rgba(14,165,233,.12);}
.dot{background:#fff;border-radius:50%;pointer-events:none;}

/* 툴바 버튼 비활성 */
.tbtn.disabled,.tbtn:disabled{opacity:.32;pointer-events:none;cursor:default;}
.bnt.disabled,.bnt:disabled{opacity:.32;pointer-events:none;}
#hsList{flex:1;overflow-y:auto;padding:6px;}
.hsc{padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:5px;cursor:pointer;}
.hsc:hover,.hsc:active{border-color:rgba(14,165,233,.4);}
.hsc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.hsc-n{background:var(--ac);color:#000;font-size:9px;font-family:var(--mono);font-weight:700;
  width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hsc-title{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hsc-del{width:26px;height:26px;border-radius:4px;color:var(--txs);font-size:15px;display:flex;align-items:center;justify-content:center;}
.hsc-del:active{color:var(--rd);}
.hsc-prev{font-size:11px;color:var(--txm);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.hsc{touch-action:none;user-select:none;-webkit-user-select:none;}
.hsc.dragging{opacity:.4;background:var(--s3);cursor:grabbing;}
.hsc.drag-over{border-color:var(--ac);background:rgba(14,165,233,.08);}
@keyframes longpress-pulse{
  0%{box-shadow:0 0 0 0 rgba(14,165,233,.5);}
  70%{box-shadow:0 0 0 6px rgba(14,165,233,0);}
  100%{box-shadow:0 0 0 0 rgba(14,165,233,0);}
}
.hsc.drag-ready{border-color:rgba(14,165,233,.5);animation:longpress-pulse .9s ease-out;}
.ehs{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:24px;color:var(--txs);font-size:12px;text-align:center;height:100%;}

/* ── MOBILE ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;backdrop-filter:blur(3px);}
#overlay.on{display:block;}
.spanel{position:fixed;top:0;bottom:0;background:var(--s1);z-index:410;display:flex;
  flex-direction:column;overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:var(--shL);}
.spanel.L{left:0;width:min(274px,82vw);border-right:1px solid var(--bd);transform:translateX(-100%);}
.spanel.R{right:0;width:min(274px,82vw);border-left:1px solid var(--bd);transform:translateX(100%);}
.spanel.open{transform:translateX(0);}
.sp-hdr{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sp-title{font-size:10px;font-family:var(--mono);color:var(--txs);letter-spacing:2px;}
.sp-close{width:32px;height:32px;border-radius:5px;color:var(--txm);font-size:18px;display:flex;
  align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--bd);}
.sp-close:active{color:var(--rd);}
.sp-body{flex:1;overflow-y:auto;}
.sp-add{padding:6px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
#bnav{display:none;height:var(--bnav);flex-shrink:0;background:var(--s1);border-top:1px solid var(--bd);
  align-items:center;justify-content:space-around;padding:0 2px;padding-bottom:var(--sab);}
.bnt{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;
  border-radius:7px;color:var(--txs);background:transparent;font-size:8px;min-height:46px;justify-content:center;}
.bnt .bi{font-size:18px;line-height:1;}
.bnt.on{color:var(--ac);}
.bnt:active{background:rgba(14,165,233,.08);}

/* ── 생성 확인 다이얼로그 ── */
#confirmDlg{position:fixed;inset:0;background:rgba(4,10,20,.78);z-index:600;
  display:none;align-items:center;justify-content:center;padding:18px;
  backdrop-filter:blur(4px);}
#confirmDlg.open{display:flex;}
.cdlg{background:var(--s1);border:1px solid var(--bdL);border-radius:14px;
  padding:22px 24px;width:min(280px,92vw);box-shadow:var(--shL);}
.cdlg-title{font-size:15px;font-weight:600;color:var(--wh);margin:0 0 6px;}
.cdlg-sub{font-size:13px;color:var(--txm);margin:0 0 20px;line-height:1.5;}
.cdlg-btns{display:flex;gap:8px;}
.cdlg-btns button{flex:1;padding:10px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;}
.cdlg-cancel{background:transparent;border:1px solid var(--bd);color:var(--txm);}
.cdlg-cancel:active{border-color:var(--ac);color:var(--ac);}
.cdlg-ok{background:var(--ac);border:none;color:#000;font-weight:700;}
.cdlg-ok:active{opacity:.85;}

/* ── MODALS ── */
.modal-wrap{position:fixed;inset:0;background:rgba(4,10,20,.88);z-index:500;display:flex;
  align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(6px);}
.modal{background:var(--s1);border:1px solid var(--bdL);border-radius:13px;
  width:min(610px,96vw);max-height:min(88vh,760px);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shL);}
.m-hdr{padding:15px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.m-badge{background:linear-gradient(135deg,var(--ac),var(--gr));color:#000;font-family:var(--mono);
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:11px;flex-shrink:0;}
.m-tin{flex:1;background:transparent;border:none;color:var(--wh);font-size:15px;font-weight:600;outline:none;}
.m-tin::placeholder{color:var(--txs);}
.m-close{width:32px;height:32px;border-radius:6px;color:var(--txm);font-size:20px;display:flex;
  align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--bd);flex-shrink:0;}
.m-close:active{color:var(--rd);}
.m-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:13px;}
.m-tabs{display:flex;gap:5px;}
.m-tab{padding:7px 14px;background:transparent;border:1px solid var(--bd);color:var(--txm);
  font-size:12px;border-radius:var(--r);min-height:38px;}
.m-tab.on{background:rgba(14,165,233,.12);border-color:rgba(14,165,233,.5);color:var(--ac);}
.tc{display:none;flex-direction:column;gap:11px;}
.tc.on{display:flex;}
.flbl{font-size:10px;color:var(--txs);font-family:var(--mono);letter-spacing:1px;margin-bottom:2px;}
textarea.fin,input.fin,select.fin{background:var(--s2);border:1px solid var(--bd);color:var(--tx);
  font-size:13px;border-radius:var(--r);padding:10px 12px;outline:none;width:100%;}
textarea.fin{resize:vertical;min-height:100px;line-height:1.6;}
textarea.fin:focus,input.fin:focus,select.fin:focus{border-color:rgba(14,165,233,.6);}
.vt{font-size:13px;line-height:1.8;color:var(--tx);white-space:pre-wrap;}
.vi{max-width:100%;border-radius:7px;margin-top:7px;border:1px solid var(--bd);}
.vtbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:7px;}
.vtbl th{background:var(--s3);color:var(--ac);padding:8px 11px;text-align:left;border:1px solid var(--bd);font-size:11px;}
.vtbl td{padding:8px 11px;border:1px solid var(--bd);color:var(--tx);}
.vtbl tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.t-ctrl{display:flex;gap:5px;flex-wrap:wrap;}
.t-in{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.t-in table{width:100%;border-collapse:collapse;}
.t-in td{padding:0;border:1px solid var(--bd);}
.t-in td input{width:100%;border:none;background:transparent;padding:8px 9px;font-size:12px;color:var(--tx);outline:none;font-family:var(--sans);}
.t-in td.th input{color:var(--ac);font-weight:600;}
.up-area{border:2px dashed var(--bd);border-radius:var(--r);padding:26px;text-align:center;cursor:pointer;color:var(--txs);font-size:12px;}
.up-area:active{border-color:var(--ac);color:var(--ac);}
.m-footer{padding:12px 17px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0;}
.btn{padding:9px 20px;border-radius:var(--r);font-size:13px;min-height:40px;border:none;font-weight:500;}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--acd));color:#000;font-weight:700;}
.btn-p:active{opacity:.85;}
.btn-s{background:var(--s2);color:var(--txm);border:1px solid var(--bd);}
.btn-s:active{border-color:var(--ac);color:var(--ac);}
.dlg-wrap{position:fixed;inset:0;background:rgba(4,10,20,.78);z-index:600;display:flex;
  align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px);}
.dlg{background:var(--s1);border:1px solid var(--bdL);border-radius:13px;padding:20px;
  width:min(380px,95vw);display:flex;flex-direction:column;gap:13px;box-shadow:var(--shL);}
.dlg-title{font-size:14px;font-weight:700;color:var(--wh);}
.dlg-sub{font-size:12px;color:var(--txm);}
#toast{position:fixed;bottom:calc(var(--bnav)+14px+var(--sab));left:50%;
  transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--bdL);
  color:var(--tx);font-size:12px;padding:8px 16px;border-radius:18px;white-space:nowrap;
  z-index:700;opacity:0;transition:all .28s;pointer-events:none;box-shadow:var(--sh);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:1024px){
  #main{grid-template-columns:1fr!important;}
  #sideL,#sideR{display:none;}
  #menuBtn{display:flex;}
  #bnav{display:flex;}
  .ttip{display:none;}
  #btnTL,#btnTR{display:none!important;}
  #canvasArea{padding:8px;}
}
@media(max-width:600px){:root{--hdr:46px;--tb:46px;}}
@media(max-height:500px){
  :root{--hdr:40px;--tb:40px;--bnav:44px;}
  .bnt span:last-child{display:none;}
}

<div id="shell">

</div>

<div id="main">

    </div>
  </div>

  <!-- CENTER -->
  <div id="center">

<script>
'use strict';
// ════════════════════════════════════════════
//  데이터 모델
//  page.images  : [{id,data,x%,y%,w%,h%}]   ← #cv 크기 기준 %
//  page.hotspots: [{id,x%,y%,w%,h%,title,text,tblData,imgData,tab}]
//  page.tboxes  : [{id,x%,y%,w%,h%,text,fs,color}]
//  page.drawData: dataURL | null
// ════════════════════════════════════════════

// folder: {id, name, open, parentId|null}
let ST = {folders:[],pages:[],cur:-1};
let mode = 'edit';
let addMode = 'folder';
let pageEditIdx = -1;
let editId=null, viewId=null, popImg=null;
let sL=false, sR=false;
let activeTextBox = null; // 현재 편집 중인 텍스트박스 id
let blockCvClick = false;  // 메모 리사이즈/D&D 후 캔버스 click 차단 플래그
let addHsPending = false;  // 메모 추가 대기 모드
let addTbPending = false;  // 텍스트 추가 대기 모드
let selectedImgId = null;  // 현재 선택된 이미지 id
// draw
let dCol='#10b981',dSz=2,dEr=false,dOn=false,dHist=new Map(),dLast=null;
let dTargetId=null; // 현재 그리기 대상: 이미지 id(string) | 'bg'

const $  = id => document.getElementById(id);
const CV = () => $('cv');   // 캔버스 컨테이너 div
const DL = () => $('dl');   // 드로잉 canvas 엘리먼트
const CTX= () => DL().getContext('2d');

// #cv 크기 (단위: px)
const cvW = () => CV().offsetWidth;
const cvH = () => CV().offsetHeight;

// #cv 기준 좌표로 변환 (clientX/Y → cv 내부 px)
function cvPt(clientX, clientY) {
  const r = CV().getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── 휴지통 존 공통 유틸 ──────────────────────
// trashShow/Hide/IsOver/UpdateOver → 위에서 정의됨
function trashShow(ghostEl){
  $('tb').classList.add('trash-zone');
  $('trashZoneInner').classList.add('show');
  const dcb=$('drawCtrlBar'), tbb=$('tbBtns');
  if(dcb) dcb.style.display='none';
  if(tbb) tbb.style.display='none';
  // ghost 설정
  if(ghostEl){
    const g=$('trashGhost');
    const r=ghostEl.getBoundingClientRect();
    g.style.width=Math.min(120,r.width)+'px';
    g.style.height=Math.min(80,r.height)+'px';
    g.style.left=r.left+'px';
    g.style.top=r.top+'px';
    // 배경 이미지나 텍스트 복사
    g.style.background=getComputedStyle(ghostEl).background||'var(--s2)';
    g.innerHTML=ghostEl.innerHTML||'';
    g.classList.add('show');
  }
}
function trashHide(){
  $('tb').classList.remove('trash-zone','trash-zone-over');
  $('trashZoneInner').classList.remove('show','over');
  const dcb=$('drawCtrlBar'), tbb=$('tbBtns');
  if(dcb&&tbb){
    if(mode==='draw'){dcb.style.display='flex';tbb.style.display='none';}
    else{dcb.style.display='none';tbb.style.display='flex';}
  }
  const g=$('trashGhost');
  g.classList.remove('show');
  g.innerHTML='';
}
function trashIsOver(clientX, clientY){
  const r=$('tb').getBoundingClientRect();
  return clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom;
}
function trashUpdateOver(clientX, clientY){
  const over=trashIsOver(clientX,clientY);
  $('tb').classList.toggle('trash-zone-over',over);
  $('trashZoneInner').classList.toggle('over',over);
  // ghost 이동
  const g=$('trashGhost');
  if(g.classList.contains('show')){
    g.style.left=(clientX-parseInt(g.style.width)/2)+'px';
    g.style.top=(clientY-parseInt(g.style.height)/2)+'px';
  }
}

// ── 생성 확인 다이얼로그 ──────────────────────
function showConfirmDlg(title, sub, onOk, okLabel='생성', onCancel=null){
  $('cdlgTitle').textContent=title;
  $('cdlgSub').textContent=sub;
  $('cdlgOk').textContent=okLabel;
  $('confirmDlg').classList.add('open');
  const ok=$('cdlgOk'), cancel=$('cdlgCancel');
  function cleanup(){$('confirmDlg').classList.remove('open');ok.onclick=null;cancel.onclick=null;}
  ok.onclick=()=>{cleanup();onOk();};
  cancel.onclick=()=>{cleanup();if(onCancel)onCancel();};
  // 삭제 확인 시 빨간 버튼
  ok.style.background=okLabel==='삭제'?'var(--rd)':'var(--ac)';
  ok.style.color=okLabel==='삭제'?'#fff':'#000';
}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ── 저장 / 불러오기 ──────────────────────────
function save(){try{localStorage.setItem('ata_v8',JSON.stringify(ST));}catch(e){}}
function load(){
  try{
    const raw=['ata_v8','ata_v7','ata_v6','ata_v5'].reduce((a,k)=>a||localStorage.getItem(k),null);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(!d||!Array.isArray(d.pages))return;
    ST=d; if(!ST.folders)ST.folders=[];
    ST.folders.forEach(f=>{if(f.parentId===undefined)f.parentId=null;});
    ST.pages.forEach(p=>{
      if(!p.images)p.images=[];
      if(p.imgData&&!p.images.length){
        // 구버전 마이그레이션: 단일 이미지 → images 배열
        p.images=[{id:Date.now()+Math.random(),data:p.imgData,x:0,y:0,w:100,h:100}];
        delete p.imgData; delete p.imgW;
      }
      if(!p.tboxes)p.tboxes=[];
      if(!p.hotspots)p.hotspots=[];
      p.images.forEach(im=>{ if(im.drawData===undefined) im.drawData=null; });
    });
  }catch(e){localStorage.removeItem('ata_v8');}
}

function resetAll(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?'))return;
  ['ata_v8','ata_v7','ata_v6','ata_v5','ata_v4'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// ── INIT ─────────────────────────────────────
// 툴바 비활성 상태 동기화
function updateToolbarDisabled(){
  const noPage = ST.cur < 0;
  const noImg  = noPage || !ST.pages[ST.cur]?.images?.length;
  // 페이지 없으면 전부 비활성
  ['bView','bEdit','bDraw','bAddHs','bAddTb'].forEach(id=>{
    const b=$(id); if(b) b.classList.toggle('disabled', noPage);
  });
  // 이미지 추가 버튼은 페이지만 있으면 활성
  const bImg=document.querySelector('#tbBtns button[onclick="triggerImg()"]');
  if(bImg) bImg.classList.toggle('disabled', noPage);
  // 메모 추가는 이미지도 있어야 활성
  const bHs=$('bAddHs'); if(bHs) bHs.classList.toggle('disabled', noImg);
  // 모바일 하단
  ['bnView','bnEdit','bnDraw'].forEach(id=>{
    const b=$(id); if(b) b.classList.toggle('disabled', noPage);
  });
}

function init(){
  load();
  checkMobile();
  initSidebars();
  renderPages();
  if(ST.pages.length>0) loadPage(ST.cur>=0?ST.cur:0);
  else showNoPage();
  initCVEvents();
  initDrawEvents();
  setMode('edit');
  window.addEventListener('resize',()=>{checkMobile();refreshPage();});
  window.addEventListener('orientationchange',()=>setTimeout(()=>{checkMobile();refreshPage();},200));
}

function checkMobile(){
  const m=window.innerWidth<=1024;
  $('menuBtn').style.display=m?'flex':'none';
  $('rPanelBtn').style.display=m?'flex':'none';
  $('bnav').style.display=m?'flex':'none';
  $('btnTL').style.display=m?'none':'flex';
  $('btnTR').style.display=m?'none':'flex';
}

function refreshPage(){
  if(ST.cur<0)return;
  const p=ST.pages[ST.cur];
  if(!p)return;
  renderAll(p);
}

// ── 사이드바 ─────────────────────────────────
function initSidebars(){
  $('sideL').classList.add('col');$('sideR').classList.add('col');
  $('main').classList.add('hL','hR');
  $('btnTL').classList.remove('on');$('btnTR').classList.remove('on');
}
function toggleSideL(){
  sL=!sL;
  $('sideL').classList.toggle('col',!sL);
  $('main').classList.toggle('hL',!sL);
  $('btnTL').classList.toggle('on',sL);
  $('cwBlur').classList.toggle('on',sL||sR);
  if(sL||sR) $('cwBlur').addEventListener('pointerdown',closeSidePanels,{once:true});
  setTimeout(refreshPage,300);
}
function toggleSideR(){
  sR=!sR;
  $('sideR').classList.toggle('col',!sR);
  $('main').classList.toggle('hR',!sR);
  $('btnTR').classList.toggle('on',sR);
  $('cwBlur').classList.toggle('on',sL||sR);
  if(sL||sR) $('cwBlur').addEventListener('pointerdown',closeSidePanels,{once:true});
  setTimeout(refreshPage,300);
}
function togglePanel(side){
  const pid=side==='L'?'panelL':'panelR';
  const panel=$(pid);const was=panel.classList.contains('open');
  closeAllPanels();
  if(!was){
    panel.classList.add('open');$('overlay').classList.add('on');
    if(side==='L'){$('pageListM').innerHTML=$('pageList').innerHTML;initPageDnD($('pageListM'));}
    if(side==='R'){$('hsListM').innerHTML=$('hsList').innerHTML;$('hsCountM').textContent=$('hsCnt').textContent;initHSDnD($('hsListM'));}
  }
}
function closeAllPanels(){['panelL','panelR'].forEach(id=>$(id).classList.remove('open'));$('overlay').classList.remove('on');}
function closeSidePanels(){
  if(sL){sL=false;$('sideL').classList.add('col');$('main').classList.add('hL');$('btnTL').classList.remove('on');}
  if(sR){sR=false;$('sideR').classList.add('col');$('main').classList.add('hR');$('btnTR').classList.remove('on');}
  $('cwBlur').classList.remove('on');
  setTimeout(refreshPage,300);
}

// ── 페이지 목록 ──────────────────────────────
// 폴더 트리를 재귀로 렌더링. depth=0이 루트.
function folderHTML(fid, depth){
  const f=ST.folders.find(x=>x.id==fid);if(!f)return'';
  const open=f.open!==false;
  const children=[...ST.folders.filter(x=>x.parentId==fid)].sort(naturalSort);
  const fps=[...ST.pages.filter(p=>p.folderId==fid)].sort(naturalSort);
  const totalCnt=fps.length+children.reduce((a,c)=>a+countInFolder(c.id),0);
  const indent=depth>0?`style="padding-left:${depth*10}px"`:'';
  let inner='';
  fps.forEach(p=>inner+=pH(p,ST.pages.indexOf(p)));
  children.forEach(c=>inner+=folderHTML(c.id,depth+1));
  return `<div class="folder${depth>0?' subfolder':''}" data-fid="${f.id}" ${indent}>
    <div class="fhdr">
      <span class="drag-handle" title="드래그">⠿</span>
      <span class="farr ${open?'op':''}" onclick="event.stopPropagation();toggleF('${f.id}')">▶</span>
      <span style="font-size:12px;flex-shrink:0">${depth>0?'📂':'📁'}</span>
      <span class="fname" data-fid="${f.id}" onclick="event.stopPropagation();startInlineEditFolder('${f.id}',this)">${eh(f.name)}</span>
      <span class="fcnt">${totalCnt}</span>
      <button class="fdel" onclick="event.stopPropagation();delFolder('${f.id}')">×</button>
    </div>
    <div class="fpages" id="fp-${f.id}" style="max-height:${open?'9999px':'0'}">
      ${inner}
    </div>
  </div>`;
}
function countInFolder(fid){
  const direct=ST.pages.filter(p=>p.folderId==fid).length;
  const subs=ST.folders.filter(x=>x.parentId==fid).reduce((a,c)=>a+countInFolder(c.id),0);
  return direct+subs;
}
function naturalSort(a,b){
  return a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'});
}
function renderPages(){
  if(!ST.folders)ST.folders=[];
  $('pageCnt').textContent=ST.pages.length;
  let h='';
  // 루트 폴더 알파벳/숫자순 정렬 후 렌더
  [...ST.folders].filter(f=>!f.parentId).sort(naturalSort).forEach(f=>h+=folderHTML(f.id,0));
  const uncat=[...ST.pages.filter(p=>!p.folderId)].sort(naturalSort);
  if(uncat.length){
    if(ST.folders.length)h+=`<div class="uncat">미분류</div>`;
    uncat.forEach(p=>h+=pH(p,ST.pages.indexOf(p)));
  }
  if(!ST.pages.length&&!ST.folders.length)
    h='<div style="padding:18px;text-align:center;color:var(--txs);font-size:12px;line-height:1.7">아래 버튼으로 추가하세요</div>';
  $('pageList').innerHTML=h;
  initPageDnD($('pageList'));
  if($('panelL').classList.contains('open')){
    $('pageListM').innerHTML=h;
    initPageDnD($('pageListM'));
  }
}
function pH(p,i){
  return `<div class="pitem ${i===ST.cur?'sel':''}" data-pidx="${i}">
    <span class="drag-handle" title="드래그">⠿</span>
    <span style="font-size:11px;color:var(--txs);flex-shrink:0">📄</span>
    <span class="pname" data-pidx="${i}" onclick="event.stopPropagation();startInlineEditPage(${i},this)">${eh(p.name)}</span>
    <span class="pcnt">${p.hotspots.length}</span>
    <button class="pdel" onclick="event.stopPropagation();delPage(${i})">×</button>
  </div>`;
}
function loadPageC(i){closeAllPanels();loadPage(i);}

// ── 인라인 이름 편집 ──────────────────────────
// iOS Safari에서 input focus 시 viewport가 밀리는 현상 방지:
// ① readOnly=true 상태로 DOM에 삽입 + focus() → 키보드 안 올라옴 = 레이아웃 고정
// ② 다음 rAF에서 readOnly=false → 이때 키보드가 올라와도 이미 위치 확정된 상태
function makeInlineInput(cur, onCommit, onCancel){
  const inp=document.createElement('input');
  inp.className='inline-edit';inp.value=cur;
  inp.setAttribute('inputmode','text');
  let committed=false;

  function commit(){
    if(committed)return;committed=true;
    cleanup();
    const v=inp.value.trim()||cur;
    onCommit(v);
  }
  function cancel(){
    if(committed)return;committed=true;
    cleanup();
    onCancel();
  }
  // 외부 탭 시 강제 blur — 단 사이드바 내부 클릭은 무시 (패널 내 다른 항목 탭 시 충돌 방지)
  function onOutsideTap(e){
    if(inp.contains(e.target))return;
    // 같은 사이드바 패널 안을 클릭한 경우 무시 (다른 이름 탭, 폴더 탭 등)
    const panel=inp.closest('#sideL,#sideR,#panelL,#panelR');
    if(panel&&panel.contains(e.target))return;
    commit();
  }
  function cleanup(){
    document.removeEventListener('pointerdown',onOutsideTap,true);
  }
  document.addEventListener('pointerdown',onOutsideTap,true);

  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){cancel();}
    e.stopPropagation();
  });
  inp.addEventListener('blur',commit);
  inp.addEventListener('pointerdown',e=>e.stopPropagation());
  inp.addEventListener('click',e=>e.stopPropagation());
  return inp;
}

// ── 페이지/폴더 D&D (롱프레스 900ms) ──────────
function initPageDnD(container){
  let dragEl=null,dragType=null,dragData=null,isDragging=false,longPressTimer=null;
  let dropTarget=null;
  let abortCtrl=null; // document 이벤트 정리용

  function cancelLP(){clearTimeout(longPressTimer);longPressTimer=null;}

  function clearIndicator(){
    container.querySelectorAll('.drop-indicator').forEach(e=>e.remove());
    container.querySelectorAll('.fhdr').forEach(el=>el.classList.remove('drag-over-into'));
    dropTarget=null;
  }

  function resetState(){
    cancelLP();
    clearIndicator();
    if(dragEl) dragEl.classList.remove('dragging','drag-ready');
    dragEl=null;dragType=null;dragData=null;isDragging=false;
    // document 이벤트 제거
    if(abortCtrl){abortCtrl.abort();abortCtrl=null;}
  }

  function showDropIndicator(refEl, above){
    clearIndicator();
    const ind=document.createElement('div');
    ind.className='drop-indicator';
    if(above) refEl.parentNode.insertBefore(ind, refEl);
    else refEl.parentNode.insertBefore(ind, refEl.nextSibling);
    dropTarget={el:refEl, above, into:false};
  }

  function showIntoIndicator(fhdrEl){
    clearIndicator();
    fhdrEl.classList.add('drag-over-into');
    dropTarget={el:fhdrEl, above:false, into:true};
  }

  function findTarget(clientY){
    const items=Array.from(container.querySelectorAll('.fhdr,.pitem')).filter(el=>{
      if(dragType==='folder'){
        const folderDiv=container.querySelector(`.folder[data-fid="${dragData}"]`);
        if(folderDiv&&folderDiv.contains(el)) return false;
      }else{
        if(el===dragEl) return false;
      }
      return true;
    });
    let best=null,bestDist=Infinity;
    items.forEach(el=>{
      const box=el.getBoundingClientRect();
      const mid=box.top+box.height/2;
      const dist=Math.abs(clientY-mid);
      if(dist<bestDist){bestDist=dist;best={el,above:clientY<mid,dist};}
    });
    return best;
  }

  function startDrag(){
    isDragging=true;
    dragEl.classList.remove('drag-ready');
    dragEl.classList.add('dragging');
    toast('드래그 모드 활성');
    abortCtrl=new AbortController();
    const sig={signal:abortCtrl.signal};
    document.addEventListener('pointermove',onMove,{passive:false,...sig});
    document.addEventListener('pointerup',onUp,sig);
    document.addEventListener('pointercancel',()=>resetState(),sig);
    // 드래그 중 스크롤 방지
    document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false,...sig});
  }

  function onMove(e){
    if(!isDragging)return;
    e.preventDefault();
    const t=findTarget(e.clientY);
    if(!t){clearIndicator();return;}
    const isFhdr=t.el.classList.contains('fhdr');
    if(isFhdr&&t.dist<22){
      showIntoIndicator(t.el);
    }else{
      showDropIndicator(t.el, t.above);
    }
  }

  function onUp(e){
    if(!isDragging){resetState();return;}
    cancelLP();
    const savedType=dragType,savedData=dragData;
    const saved=dropTarget;
    resetState();

    if(!saved)return;

    if(savedType==='page'){
      const pageIdx=parseInt(savedData);
      const page=ST.pages[pageIdx]; if(!page)return;

      if(saved.into){
        const folderDiv=saved.el.closest('.folder');
        if(!folderDiv)return;
        page.folderId=parseInt(folderDiv.dataset.fid);
        save();renderPages();return;
      }
      if(saved.el.classList.contains('fhdr')){
        page.folderId=null;
        save();renderPages();return;
      }
      const toIdx=parseInt(saved.el.dataset.pidx);
      if(isNaN(toIdx)||toIdx===pageIdx)return;
      const[moved]=ST.pages.splice(pageIdx,1);
      const adj=pageIdx<toIdx?toIdx-1:toIdx;
      const insertAt=saved.above?adj:adj+1;
      ST.pages.splice(Math.max(0,Math.min(ST.pages.length,insertAt)),0,moved);
      ST.cur=ST.pages.indexOf(moved);
      save();renderPages();

    }else if(savedType==='folder'){
      const fid=parseInt(savedData);
      const folder=ST.folders.find(f=>f.id==fid); if(!folder)return;
      function isDesc(pid,cid){
        return ST.folders.filter(f=>f.parentId==pid).some(f=>f.id==cid||isDesc(f.id,cid));
      }
      if(saved.el.classList.contains('fhdr')){
        const toDiv=saved.el.closest('.folder');
        if(!toDiv)return;
        const toFid=parseInt(toDiv.dataset.fid);
        if(toFid===fid||isDesc(fid,toFid))return;
        folder.parentId=saved.into ? toFid : (ST.folders.find(f=>f.id==toFid)?.parentId??null);
      }else{
        folder.parentId=null;
      }
      save();renderPages();
    }
  }

  // ── .fhdr 폴더 — 드래그 핸들에서만 롱프레스 ──
  container.querySelectorAll('.fhdr').forEach(hdr=>{
    const folderEl=hdr.closest('.folder');
    if(!folderEl)return;
    const fid=parseInt(folderEl.dataset.fid);
    const handle=hdr.querySelector('.drag-handle');
    if(!handle)return;

    handle.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      e.preventDefault();
      cancelLP();
      dragEl=folderEl; dragType='folder'; dragData=fid; isDragging=false;
      folderEl.classList.add('drag-ready');
      longPressTimer=setTimeout(startDrag, 600);
    });
    handle.addEventListener('pointerup',()=>{
      if(!isDragging){cancelLP();if(dragEl)dragEl.classList.remove('drag-ready');dragEl=null;}
    });
    handle.addEventListener('pointercancel',()=>{cancelLP();if(dragEl)dragEl.classList.remove('drag-ready');dragEl=null;});
    handle.addEventListener('contextmenu',e=>e.preventDefault());
  });

  // ── .pitem 페이지 — 드래그 핸들에서만 롱프레스 ──
  container.querySelectorAll('.pitem').forEach(el=>{
    const pidx=parseInt(el.dataset.pidx);
    const handle=el.querySelector('.drag-handle');
    if(!handle)return;

    handle.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      e.preventDefault();
      cancelLP();
      dragEl=el; dragType='page'; dragData=pidx; isDragging=false;
      el.classList.add('drag-ready');
      longPressTimer=setTimeout(startDrag, 600);
    });
    handle.addEventListener('pointerup',e=>{
      if(!isDragging){cancelLP();if(dragEl)dragEl.classList.remove('drag-ready');dragEl=null;}
    });
    handle.addEventListener('pointercancel',()=>{cancelLP();if(dragEl)dragEl.classList.remove('drag-ready');dragEl=null;});
    handle.addEventListener('contextmenu',e=>e.preventDefault());

    // 핸들 외 영역 탭 → 페이지 로드
    el.addEventListener('pointerup',e=>{
      if(e.target.closest('.drag-handle,.pname,.pdel'))return;
      if(!isDragging) loadPageC(parseInt(el.dataset.pidx));
    });
  });
}
function delPage(i){
  if(!confirm(`"${ST.pages[i].name}" 삭제?`))return;
  ST.pages.splice(i,1);save();

// ── 이미지 렌더 ──────────────────────────────
function renderImgs(page){
  CV().querySelectorAll('.ci').forEach(e=>e.remove());
  const W=cvW(),H=cvH();
  page.images.forEach((im,zi)=>{
    const wrap=document.createElement('div');
    wrap.className='ci';wrap.dataset.imid=im.id;
    wrap.style.cssText=`left:${im.x*W/100}px;top:${im.y*H/100}px;width:${im.w*W/100}px;height:${im.h*H/100}px;z-index:${10+zi*2};position:absolute;`;
    if(im.id===selectedImgId) wrap.classList.add('img-selected');
    const img=new Image();img.src=im.data;
    img.style.cssText='display:block;width:100%;height:100%;pointer-events:none;border-radius:2px;position:relative;z-index:0;';
    img.draggable=false;

    // ── 이미지 종속 필기 canvas ──
    const ciDl=document.createElement('canvas');
    ciDl.className='ci-dl';
    ciDl.dataset.imid=im.id;
    // 저장된 필기 복원
    if(im.drawData){
      ciDl.classList.add('has-data');
      requestAnimationFrame(()=>{
        const w=wrap.offsetWidth, h=wrap.offsetHeight;
        if(w>0&&h>0){
          ciDl.width=w; ciDl.height=h;
          const dimg=new Image();
          dimg.onload=()=>ciDl.getContext('2d').drawImage(dimg,0,0,w,h);
          dimg.src=im.drawData;
        }
      });
    }

    // ── 리사이즈 핸들 ──
    const rh=document.createElement('div');rh.className='ci-rh';
    let rzStart=null;
    rh.addEventListener('pointerdown',e=>{
      if(mode!=='edit')return;
      e.stopPropagation();e.preventDefault();
      rh.setPointerCapture(e.pointerId);
      rzStart={ox:e.clientX,oy:e.clientY,ow:wrap.offsetWidth,oh:wrap.offsetHeight};
    });
    rh.addEventListener('pointermove',e=>{
      if(!rzStart)return;
      const nw=Math.max(40,rzStart.ow+(e.clientX-rzStart.ox));
      const nh=Math.max(30,rzStart.oh+(e.clientY-rzStart.oy));
      wrap.style.width=nw+'px';wrap.style.height=nh+'px';
      const _tp=ST.pages[ST.cur];
      if(_tp){
        const _im=_tp.images.find(x=>x.id===im.id);
        if(_im){_im.w=nw/cvW()*100;_im.h=nh/cvH()*100;renderHS(_tp);}
      }
    });
    rh.addEventListener('pointerup',()=>{
      if(!rzStart)return;
      im.w=wrap.offsetWidth/cvW()*100;im.h=wrap.offsetHeight/cvH()*100;
      save();rzStart=null;
      const _p=ST.pages[ST.cur];if(_p)renderHS(_p);
      // 리사이즈 후 ci-dl 크기 재조정 (필기 스케일 유지)
      const ciDl=wrap.querySelector('.ci-dl');
      if(ciDl&&ciDl.classList.contains('has-data')){
        const oldW=ciDl.width, oldH=ciDl.height;
        const nw=wrap.offsetWidth, nh=wrap.offsetHeight;
        if(oldW>0&&oldH>0&&nw>0&&nh>0){
          const tmp=document.createElement('canvas');
          tmp.width=nw;tmp.height=nh;
          tmp.getContext('2d').drawImage(ciDl,0,0,oldW,oldH,0,0,nw,nh);
          ciDl.width=nw;ciDl.height=nh;
          ciDl.getContext('2d').drawImage(tmp,0,0);
        }
      }
    });
    rh.addEventListener('pointercancel',()=>{rzStart=null;});

    // ── 이미지 이동 + 클릭 선택 ──
    let mvStart=null,mvLpTimer=null,mvDragging=false;
    let imOrigX=im.x, imOrigY=im.y;
    function mvReset(){
      clearTimeout(mvLpTimer);mvLpTimer=null;mvDragging=false;mvStart=null;
      wrap.classList.remove('dragging-to-trash');
      wrap.style.outline='';
      trashHide();
      document.body.style.userSelect='';
      document.body.style.webkitUserSelect='';
    }
    wrap.addEventListener('pointerdown',e=>{
      if(mode!=='edit')return;
      if(e.target===rh)return;
      e.stopPropagation();e.preventDefault();
      const p2=cvPt(e.clientX,e.clientY);
      imOrigX=im.x; imOrigY=im.y;
      mvStart={
        ox:p2.x-parseFloat(wrap.style.left), oy:p2.y-parseFloat(wrap.style.top),
        pid:e.pointerId,
        cx:e.clientX, cy:e.clientY,
        isMouse:e.pointerType==='mouse'
      };
      document.body.style.userSelect='none';
      document.body.style.webkitUserSelect='none';
      if(!mvStart.isMouse){
        // 터치/펜: 500ms 롱프레스
        mvLpTimer=setTimeout(()=>{
          mvDragging=true;
          wrap.setPointerCapture(mvStart.pid);
          CV().querySelectorAll('.ci').forEach(c=>c.style.outline='');
          wrap.style.outline='2px solid var(--ac)';
          trashShow();
        },500);
      }
    });
    wrap.addEventListener('pointermove',e=>{
      if(!mvStart)return;
      if(!mvDragging && mvStart.isMouse){
        const dist=Math.sqrt(Math.pow(e.clientX-mvStart.cx,2)+Math.pow(e.clientY-mvStart.cy,2));
        if(dist>4){
          mvDragging=true;
          wrap.setPointerCapture(mvStart.pid);
          CV().querySelectorAll('.ci').forEach(c=>c.style.outline='');
          wrap.style.outline='2px solid var(--ac)';
          trashShow();
        }
      }
      if(!mvDragging)return;
      const p2=cvPt(e.clientX,e.clientY);
      const nx=Math.max(0,Math.min(cvW()-20,p2.x-mvStart.ox));
      const ny=Math.max(0,Math.min(cvH()-20,p2.y-mvStart.oy));
      wrap.style.left=nx+'px';wrap.style.top=ny+'px';
      const over=trashIsOver(e.clientX,e.clientY);
      wrap.classList.toggle('dragging-to-trash',over);
      trashUpdateOver(e.clientX,e.clientY);
      const _tp=ST.pages[ST.cur];
      if(_tp){
        const _im=_tp.images.find(x=>x.id===im.id);
        if(_im){
          const _sx=_im.x,_sy=_im.y;
          _im.x=nx/cvW()*100;_im.y=ny/cvH()*100;
          renderHS(_tp);
          _im.x=_sx;_im.y=_sy;
        }
      }
    });
    wrap.addEventListener('pointerup',e=>{
      const wasDragging=mvDragging;
      const overTrash=trashIsOver(e.clientX,e.clientY);
      mvReset();
      if(!wasDragging){
        // 클릭 → 이미지 선택 (이미 선택된 이미지면 그대로 유지)
        selectImg(im.id);
        return;
      }
      if(overTrash){
        showConfirmDlg('이미지를 삭제할까요?','종속된 메모도 함께 삭제됩니다.',()=>{
          const p=ST.pages[ST.cur];if(!p)return;
          p.hotspots=p.hotspots.filter(h=>h.imgId!==im.id);
          p.images=p.images.filter(x=>x.id!==im.id);
          wrap.remove();save();
          if(selectedImgId===im.id) deselectImg();
          renderHS(p);renderHSList(p);
          updateToolbarDisabled();
          toast('이미지 삭제됨');
        },'삭제',()=>{
          im.x=imOrigX; im.y=imOrigY;
          const _p=ST.pages[ST.cur];if(!_p)return;
          renderImgs(_p);renderHS(_p);
        });
      } else {
        im.x=parseFloat(wrap.style.left)/cvW()*100;
        im.y=parseFloat(wrap.style.top)/cvH()*100;
        save();
        const _p=ST.pages[ST.cur];if(_p)renderHS(_p);
      }
    });
    wrap.addEventListener('pointercancel',()=>{
      mvReset();
      im.x=imOrigX; im.y=imOrigY;
      const _p=ST.pages[ST.cur];if(!_p)return;
      renderImgs(_p);renderHS(_p);
    });
    wrap.appendChild(img);wrap.appendChild(ciDl);wrap.appendChild(rh);
    CV().appendChild(wrap);
  });
}

// ── 이미지 선택 관리 ─────────────────────────
function selectImg(id){
  selectedImgId=id;
  // 모든 .ci에서 선택 클래스 초기화 후 해당 이미지만 표시
  CV().querySelectorAll('.ci').forEach(el=>{
    el.classList.toggle('img-selected', el.dataset.imid==id);
  });
  $('imgCtrlBar').style.display='flex';
}
function deselectImg(){
  selectedImgId=null;
  CV().querySelectorAll('.ci').forEach(el=>el.classList.remove('img-selected'));
  $('imgCtrlBar').style.display='none';
}
function imgOrderUp(){
  const p=ST.pages[ST.cur];if(!p||!selectedImgId)return;
  const idx=p.images.findIndex(x=>x.id===selectedImgId);
  if(idx<p.images.length-1){
    [p.images[idx],p.images[idx+1]]=[p.images[idx+1],p.images[idx]];
    save();renderImgs(p);renderHS(p);
  } else toast('이미 맨 위 레이어입니다');
}
function imgOrderDn(){
  const p=ST.pages[ST.cur];if(!p||!selectedImgId)return;
  const idx=p.images.findIndex(x=>x.id===selectedImgId);
  if(idx>0){
    [p.images[idx],p.images[idx-1]]=[p.images[idx-1],p.images[idx]];
    save();renderImgs(p);renderHS(p);
  } else toast('이미 맨 아래 레이어입니다');
}
function imgDelete(){
  if(!selectedImgId)return;
  const p=ST.pages[ST.cur];if(!p)return;
  const im=p.images.find(x=>x.id===selectedImgId);if(!im)return;
  showConfirmDlg('이미지를 삭제할까요?','종속된 메모도 함께 삭제됩니다.',()=>{
    p.hotspots=p.hotspots.filter(h=>h.imgId!==selectedImgId);
    p.images=p.images.filter(x=>x.id!==selectedImgId);
    deselectImg();save();
    renderImgs(p);renderHS(p);renderHSList(p);
    updateToolbarDisabled();
    toast('이미지 삭제됨');
  },'삭제');
}
function hsPxPos(hs){
  const W=cvW(),H=cvH();
  if(hs.imgId!=null){
    const p=ST.pages[ST.cur];
    const im=p&&p.images.find(x=>x.id===hs.imgId);
    if(im){
      const ix=im.x*W/100, iy=im.y*H/100;
      const iw=im.w*W/100, ih=im.h*H/100;
      return {x: ix + hs.rx/100*iw, y: iy + hs.ry/100*ih};
    }
  }
  // 구버전 호환: 절대 좌표
  return {x: hs.x*W/100, y: hs.y*H/100};
}

// ── 메모 배지 렌더 ───────────────────────────
function renderHS(page){
  CV().querySelectorAll('.hs').forEach(e=>e.remove());
  page.hotspots.forEach((hs,i)=>{
    const el=document.createElement('div');
    el.className='hs';el.dataset.id=hs.id;
    const sz=hs.size||32;
    const pos=hsPxPos(hs);
    // 종속 이미지의 z-index 바로 위에 배치 (이미지: 10+zi*2, 메모: 10+zi*2+1)
    const imgIdx=hs.imgId!=null ? page.images.findIndex(x=>x.id===hs.imgId) : -1;
    const hsZ = imgIdx>=0 ? (10+imgIdx*2+1) : (10+page.images.length*2+1);
    el.style.cssText=`left:${pos.x}px;top:${pos.y}px;width:${sz}px;height:${sz}px;position:absolute;z-index:${hsZ};`;
    // 배지 원형
    const badge=document.createElement('div');badge.className='hs-badge';
    badge.style.cssText=`width:${sz}px;height:${sz}px;`;
    const num=document.createElement('span');num.className='hs-badge-num';
    num.style.fontSize=Math.max(9,Math.round(sz*0.38))+'px';
    num.textContent=i+1;
    badge.appendChild(num);
    // 툴팁
    const tip=document.createElement('div');tip.className='hs-tip';
    tip.textContent=hs.title||`메모 ${i+1}`;
    // 삭제 버튼
    const del=document.createElement('button');del.className='hs-del';del.textContent='×';
    del.addEventListener('pointerup',e=>{e.stopPropagation();if(confirm(`"${hs.title||`메모 ${i+1}`}" 삭제?`))delHS(hs.id);});
    el.appendChild(badge);el.appendChild(tip);el.appendChild(del);

    // ── 통합 포인터 핸들러 ──
    let state='idle'; // 'idle'|'resize'|'move'|'delete'
    let pdStart=null, lpMove=null, lpDelete=null;
    let curSz=hs.size||32;
    // 드래그 시작 전 원래 좌표 저장
    let hsOrigX=hs.x, hsOrigY=hs.y, hsOrigRx=hs.rx, hsOrigRy=hs.ry, hsOrigImgId=hs.imgId;

    function imgBounds(){
      const W=cvW(),H=cvH();
      const p=ST.pages[ST.cur];
      const im=p&&hs.imgId!=null&&p.images.find(x=>x.id===hs.imgId);
      if(!im)return null;
      return{x:im.x*W/100,y:im.y*H/100,w:im.w*W/100,h:im.h*H/100};
    }
    function applySize(ns){
      curSz=Math.max(24,Math.min(64,ns));
      el.style.width=curSz+'px';el.style.height=curSz+'px';
      badge.style.width=curSz+'px';badge.style.height=curSz+'px';
      num.style.fontSize=Math.max(9,Math.round(curSz*0.38))+'px';
    }
    function resetState(){
      clearTimeout(lpMove);clearTimeout(lpDelete);
      lpMove=null;lpDelete=null;
      state='idle';pdStart=null;
      el.classList.remove('hs-ready','hs-dragging','hs-resizing','hs-delwarn');
      document.body.style.userSelect='';
      document.body.style.webkitUserSelect='';
    }

    el.addEventListener('pointerdown',e=>{
      if(mode!=='edit'&&mode!=='view')return;
      if(e.target===del)return;
      e.stopPropagation();
      resetState();
      pdStart={
        px:e.clientX, py:e.clientY,
        pid:e.pointerId,
        left:parseFloat(el.style.left), top:parseFloat(el.style.top),
        sz:curSz, time:Date.now(),
        isMouse: e.pointerType==='mouse'
      };
      blockCvClick=false;
      document.body.style.userSelect='none';
      document.body.style.webkitUserSelect='none';

      if(mode==='edit'){
        if(pdStart.isMouse){
          // 마우스: pointermove에서 dist>4 감지 시 즉시 이동 (클릭과 구분)
        } else {
          // 터치/펜: 0.5초 롱프레스 후 이동
          lpMove=setTimeout(()=>{
            if(state!=='idle')return;
            state='move';
            blockCvClick=true;
            hsOrigX=hs.x; hsOrigY=hs.y; hsOrigRx=hs.rx; hsOrigRy=hs.ry; hsOrigImgId=hs.imgId;
            try{el.setPointerCapture(pdStart.pid);}catch(err){}
            el.classList.add('hs-ready');
            trashShow();
            setTimeout(()=>{
              if(state!=='move')return;
              el.classList.remove('hs-ready');
              el.classList.add('hs-dragging');
            },100);
          },500);
          // 3초: 삭제 경고 (터치 전용)
          lpDelete=setTimeout(()=>{
            if(state==='resize'||state==='move')return;
            state='delete';
            el.classList.add('hs-delwarn');
            toast('손 떼면 삭제됩니다');
          },3000);
        }
      }
    });

    el.addEventListener('pointermove',e=>{
      if(!pdStart)return;
      const dx=e.clientX-pdStart.px, dy=e.clientY-pdStart.py;
      const dist=Math.sqrt(dx*dx+dy*dy);

      if(state==='idle'&&mode==='edit'){
        if(pdStart.isMouse&&dist>4){
          // 마우스: 즉시 이동 모드로 전환
          clearTimeout(lpMove);clearTimeout(lpDelete);
          state='move';
          blockCvClick=true;
          hsOrigX=hs.x; hsOrigY=hs.y; hsOrigRx=hs.rx; hsOrigRy=hs.ry; hsOrigImgId=hs.imgId;
          try{el.setPointerCapture(pdStart.pid);}catch(err){}
          el.classList.add('hs-dragging');
          trashShow();
        } else if(!pdStart.isMouse&&dist>14){
          // 터치/펜: 빠른 스와이프 → 크기 변경 (롱프레스 타이머 취소)
          clearTimeout(lpMove);clearTimeout(lpDelete);
          state='resize';
          blockCvClick=true;
          try{el.setPointerCapture(pdStart.pid);}catch(err){}
          el.classList.add('hs-resizing');
        }
      }

      if(state==='resize'){
        e.preventDefault();
        const dominant=Math.abs(dx)>=Math.abs(dy)?dx:dy;
        applySize(pdStart.sz+dominant);
      } else if(state==='move'){
        e.preventDefault();
        const pt=cvPt(e.clientX,e.clientY);
        // transform:translate(-50%,-50%) 덕분에 포인터 위치 = style.left/top 그대로 사용
        let nx=pt.x;
        let ny=pt.y;
        nx=Math.max(-curSz/2, Math.min(cvW()-curSz/2, nx));
        ny=Math.max(-curSz/2, Math.min(cvH()-curSz/2, ny));
        el.style.left=nx+'px'; el.style.top=ny+'px';
        const over=trashIsOver(e.clientX,e.clientY);
        el.classList.toggle('dragging-to-trash',over);
        trashUpdateOver(e.clientX,e.clientY);
      }
    },{passive:false});

    el.addEventListener('pointerup',e=>{
      const endState=state;
      const overTrash=trashIsOver(e.clientX,e.clientY);
      resetState();
      trashHide();
      el.classList.remove('dragging-to-trash');
      setTimeout(()=>{blockCvClick=false;},50);

      if(endState==='resize'){
        hs.size=curSz;save();
      } else if(endState==='move'){
        e.stopPropagation();e.preventDefault();
        if(overTrash){
          showConfirmDlg(`메모를 삭제할까요?`,`"${hs.title||`메모 ${i+1}`}"이(가) 삭제됩니다.`,
            ()=>delHS(hs.id),'삭제',
            ()=>{
              // 취소: 원래 좌표 복원 후 renderHS
              hs.x=hsOrigX; hs.y=hsOrigY; hs.rx=hsOrigRx; hs.ry=hsOrigRy; hs.imgId=hsOrigImgId;
              el.remove();
              const p=ST.pages[ST.cur];if(p)renderHS(p);
            });
        } else {
          const W=cvW(),H=cvH();
          // style.left/top = 배지 중심 좌표 (transform:-50%,-50% 기준)
          const cx=parseFloat(el.style.left);
          const cy=parseFloat(el.style.top);
          const p=ST.pages[ST.cur];
          // 드롭 위치에서 히트 이미지 재판별 → 이미지 위면 그 이미지에 재종속
          const hitImg=p&&[...p.images].reverse().find(im2=>{
            const ix=im2.x*W/100,iy=im2.y*H/100,iw=im2.w*W/100,ih=im2.h*H/100;
            return cx>=ix&&cx<=ix+iw&&cy>=iy&&cy<=iy+ih;
          });
          if(hitImg){
            hs.imgId=hitImg.id;
            const ix=hitImg.x*W/100,iy=hitImg.y*H/100,iw=hitImg.w*W/100,ih=hitImg.h*H/100;
            hs.rx=(cx-ix)/iw*100; hs.ry=(cy-iy)/ih*100;
            hs.x=cx/W*100;hs.y=cy/H*100;
            save();renderHS(p);
          } else {
            // 이미지 밖에 드롭 → 원래 자리로 복귀
            toast('이미지 위에 놓아주세요');
            renderHS(p);
          }
        }
      } else if(endState==='delete'){
        showConfirmDlg(`메모를 삭제할까요?`,`"${hs.title||`메모 ${i+1}`}"이(가) 삭제됩니다.`,
          ()=>delHS(hs.id),'삭제',
          ()=>{// 취소 시 원래 좌표 복원 (이동 없었으므로 현재 좌표 그대로 유지)
            const p=ST.pages[ST.cur];if(p)renderHS(p);});
      } else {
        e.stopPropagation();
        if(mode==='view')openView(hs.id);
        else if(mode==='edit')openEdit(hs.id);
      }
    });

    el.addEventListener('pointercancel',()=>{
      resetState();trashHide();blockCvClick=false;
      // 취소: 원래 좌표 복원 후 renderHS
      hs.x=hsOrigX; hs.y=hsOrigY; hs.rx=hsOrigRx; hs.ry=hsOrigRy; hs.imgId=hsOrigImgId;
      el.remove();
      const p=ST.pages[ST.cur];if(p)renderHS(p);
    });
    CV().appendChild(el);
  });
}

// ── 텍스트박스 렌더 ──────────────────────────
function renderTB(page){
  CV().querySelectorAll('.tb').forEach(e=>e.remove());
  if(!page.tboxes)return;
  const W=cvW(),H=cvH();
  page.tboxes.forEach(tb=>makeTBEl(tb,W,H));
}
function makeTBEl(tb,W,H){
  if(!W){W=cvW();H=cvH();}
  const wrap=document.createElement('div');
  wrap.className='tb';wrap.dataset.tid=tb.id;
  const initW=Math.max(80, tb.w*W/100);
  wrap.style.cssText=`left:${tb.x*W/100}px;top:${tb.y*H/100}px;width:${initW}px;position:absolute;`;

  // ── textarea ──
  const ta=document.createElement('textarea');
  ta.value=tb.text||'';ta.placeholder='텍스트 입력…';
  ta.style.cssText=`font-size:${tb.fs||14}px;color:${tb.color||'#fff'};`;
  ta.readOnly=true; // iOS 레이아웃 밀림 방지용 초기값

  // 자동 높이 조절
  function autoHeight(){
    ta.style.height='auto';
    ta.style.height=Math.max(34, ta.scrollHeight)+'px';
    const p=ST.pages[ST.cur];if(!p)return;
    const t=p.tboxes.find(x=>x.id===tb.id);
    if(t){t.text=ta.value;t.h=ta.offsetHeight/cvH()*100;save();}
  }
  ta.addEventListener('input',autoHeight);

  // ── 완료/편집 상태 전환 ──
  function enterDone(){
    ta.blur();
    ta.readOnly=true;
    wrap.classList.add('done');
    if(activeTextBox===tb.id) activeTextBox=null;
    autoHeight();
  }
  function enterEdit(){
    wrap.classList.remove('done');
    ta.readOnly=false; // 먼저 해제 → iOS 키보드 올라옴
    requestAnimationFrame(()=>{
      ta.focus();
      ta.selectionStart=ta.selectionEnd=ta.value.length;
    });
  }

  // Enter = 완료, Shift+Enter = 줄바꿈
  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      enterDone();
    }
    e.stopPropagation();
  });

  // 포커스: activeTextBox 설정 + iOS 밀림 방지
  ta.addEventListener('focus',()=>{
    activeTextBox=tb.id;
    requestAnimationFrame(()=>{ ta.readOnly=false; });
  });
  ta.addEventListener('blur',()=>{
    if(activeTextBox===tb.id) activeTextBox=null;
    ta.readOnly=true;
  });

  // done 상태에서 더블탭 → 재편집 (드래그 중이면 무시)
  let lastTapTime=0;
  wrap.addEventListener('pointerup',e=>{
    if(isDragging)return;
    if(!wrap.classList.contains('done'))return;
    const now=Date.now();
    if(now-lastTapTime<350){
      e.stopPropagation();
      enterEdit();
    }
    lastTapTime=now;
  });

  // ── 너비 조절 핸들 (편집 중일 때만) ──
  const rhR=document.createElement('div');rhR.className='tb-rh-r';
  let rzW=null;
  rhR.addEventListener('pointerdown',e=>{
    e.stopPropagation();e.preventDefault();
    rhR.setPointerCapture(e.pointerId);
    rzW={ox:e.clientX, ow:wrap.offsetWidth};
  });
  rhR.addEventListener('pointermove',e=>{
    if(!rzW)return;
    // 캔버스 우측 경계를 넘지 않도록 최댓값 클램핑
    const maxW=cvW()-parseFloat(wrap.style.left);
    const nw=Math.max(80, Math.min(maxW, rzW.ow+(e.clientX-rzW.ox)));
    wrap.style.width=nw+'px';
    autoHeight();
  });
  rhR.addEventListener('pointerup',e=>{
    if(!rzW)return;rzW=null;
    const p=ST.pages[ST.cur];if(!p)return;
    const t=p.tboxes.find(x=>x.id===tb.id);
    if(t){t.w=wrap.offsetWidth/cvW()*100;t.h=ta.offsetHeight/cvH()*100;save();}
  });
  rhR.addEventListener('pointercancel',()=>{rzW=null;});

  // ── 완료 상태 롱프레스 D&D ──
  let lpTimer=null,isDragging=false,mvStart=null;

  function cancelLP(){
    clearTimeout(lpTimer);lpTimer=null;
    wrap.classList.remove('tb-ready');
  }
  function resetDrag(){
    cancelLP();
    isDragging=false;mvStart=null;
    wrap.classList.remove('tb-dragging','tb-ready');
    wrap.style.outline='';
  }

  // 원래 위치 저장용
  let origTbX=tb.x, origTbY=tb.y;

  wrap.addEventListener('pointerdown',e=>{
    if(e.target===rhR)return;
    if(!wrap.classList.contains('done')) enterDone();
    e.stopPropagation();
    origTbX=tb.x; origTbY=tb.y;
    wrap.classList.add('tb-ready');
    const p2=cvPt(e.clientX,e.clientY);
    mvStart={
      ox:p2.x-parseFloat(wrap.style.left), oy:p2.y-parseFloat(wrap.style.top),
      cx:e.clientX, cy:e.clientY,
      isMouse:e.pointerType==='mouse'
    };
    document.body.style.userSelect='none';
    document.body.style.webkitUserSelect='none';
    if(!mvStart.isMouse){
      // 터치/펜: 500ms 롱프레스
      lpTimer=setTimeout(()=>{
        isDragging=true;
        wrap.classList.remove('tb-ready');
        wrap.classList.add('tb-dragging');
        try{wrap.setPointerCapture(e.pointerId);}catch(err){}
        trashShow();
      },500);
    }
  });

  wrap.addEventListener('pointermove',e=>{
    if(!mvStart)return;
    // 마우스: dist>4 시 즉시 드래그 시작
    if(!isDragging && mvStart.isMouse){
      const dist=Math.sqrt(Math.pow(e.clientX-mvStart.cx,2)+Math.pow(e.clientY-mvStart.cy,2));
      if(dist>4){
        isDragging=true;
        cancelLP();
        wrap.classList.remove('tb-ready');
        wrap.classList.add('tb-dragging');
        try{wrap.setPointerCapture(e.pointerId);}catch(err){}
        trashShow();
      }
    }
    if(!isDragging)return;
    e.preventDefault();
    const p2=cvPt(e.clientX,e.clientY);
    const nx=Math.max(0, Math.min(cvW()-wrap.offsetWidth,  p2.x-mvStart.ox));
    const ny=Math.max(0, Math.min(cvH()-wrap.offsetHeight, p2.y-mvStart.oy));
    wrap.style.left=nx+'px';
    wrap.style.top =ny+'px';
    const over=trashIsOver(e.clientX,e.clientY);
    wrap.classList.toggle('dragging-to-trash',over);
    trashUpdateOver(e.clientX,e.clientY);
  },{passive:false});

  wrap.addEventListener('pointerup',e=>{
    const wasDragging=isDragging;
    const overTrash=trashIsOver(e.clientX,e.clientY);
    const finalLeft=parseFloat(wrap.style.left);
    const finalTop=parseFloat(wrap.style.top);
    resetDrag();
    trashHide();
    wrap.classList.remove('dragging-to-trash');
    document.body.style.userSelect='';
    document.body.style.webkitUserSelect='';
    if(!wasDragging)return;
    if(overTrash){
      // 취소 시 원래 자리 복귀
      showConfirmDlg('텍스트를 삭제할까요?','이 텍스트 박스가 삭제됩니다.',()=>{
        if(activeTextBox===tb.id) activeTextBox=null;
        const p=ST.pages[ST.cur];if(!p)return;
        p.tboxes=p.tboxes.filter(x=>x.id!==tb.id);
        wrap.remove();save();toast('텍스트 박스 삭제됨');
      },'삭제',()=>{
        // 취소: DOM 재활용, 원래 좌표로 위치 복원 후 done 상태 명시
        tb.x=origTbX; tb.y=origTbY;
        const W=cvW(),H=cvH();
        wrap.style.left=origTbX*W/100+'px';
        wrap.style.top =origTbY*H/100+'px';
        wrap.classList.add('done');
        wrap.classList.remove('tb-dragging','tb-ready','dragging-to-trash');
      });
    } else {
      // 이동 완료 → 위치 저장
      const p=ST.pages[ST.cur];
      const t=p?.tboxes.find(x=>x.id===tb.id);
      if(t){t.x=finalLeft/cvW()*100;t.y=finalTop/cvH()*100;save();}
    }
  });
  wrap.addEventListener('pointercancel',()=>{
    resetDrag();trashHide();
    wrap.classList.remove('dragging-to-trash');
    document.body.style.userSelect='';
    document.body.style.webkitUserSelect='';
    // 취소: DOM 재활용, 원래 좌표로 위치 복원 후 done 상태 명시
    tb.x=origTbX; tb.y=origTbY;
    const W=cvW(),H=cvH();
    wrap.style.left=origTbX*W/100+'px';
    wrap.style.top =origTbY*H/100+'px';
    wrap.classList.add('done');
    wrap.classList.remove('tb-dragging','tb-ready','dragging-to-trash');
  });

  wrap.appendChild(ta);wrap.appendChild(rhR);
  CV().appendChild(wrap);

  // 기존 텍스트 있으면 완료 상태로, 없으면 편집 상태로 초기화
  requestAnimationFrame(()=>{
    ta.style.height='auto';
    ta.style.height=Math.max(34,ta.scrollHeight)+'px';
    if(tb.text) wrap.classList.add('done');
  });
}

// ── #cv 이벤트 ──────────────────────────────
// add-hs: 클릭 → 메모 배지 생성 후 edit 복귀
// add-tb: 클릭 → 텍스트박스 생성 후 edit 복귀
// edit: 빈 곳 클릭 → 아무 것도 안 함
function initCVEvents(){
  const cv=CV();

  // edit 모드: 캔버스 빈 곳 클릭 → 이미지 선택 해제
  cv.addEventListener('click',e=>{
    if(mode!=='edit')return;
    if(e.target.closest('.ci')||e.target.closest('.hs')||e.target.closest('.tb'))return;
    if(blockCvClick){blockCvClick=false;return;}
    deselectImg();
  });

  // add-hs 모드: 이미지 위 클릭 → 메모 생성
  cv.addEventListener('click',e=>{
    if(mode!=='add-hs')return;
    if(e.target.closest('.hs')||e.target.closest('.tb'))return;
    if(blockCvClick){blockCvClick=false;return;}
    const p=ST.pages[ST.cur];if(!p||!p.images.length)return;
    const pt=cvPt(e.clientX,e.clientY);
    const W=cvW(),H=cvH();
    const hitImg=[...p.images].reverse().find(im=>{
      const ix=im.x*W/100,iy=im.y*H/100,iw=im.w*W/100,ih=im.h*H/100;
      return pt.x>=ix&&pt.x<=ix+iw&&pt.y>=iy&&pt.y<=iy+ih;
    });
    if(!hitImg){toast('이미지 위에서 메모를 생성하세요');return;}
    const ix=hitImg.x*W/100,iy=hitImg.y*H/100,iw=hitImg.w*W/100,ih=hitImg.h*H/100;
    const rx=(pt.x-ix)/iw*100, ry=(pt.y-iy)/ih*100;
    showConfirmDlg(
      '메모를 생성할까요?',
      '클릭한 위치에 새 메모가 추가됩니다.',
      ()=>{
        const hs={id:Date.now(),imgId:hitImg.id,rx,ry,x:pt.x/W*100,y:pt.y/H*100,
          w:0,h:0,size:32,title:'',text:'',tblData:null,imgData:null,tab:'text'};
        p.hotspots.push(hs);renderHS(p);renderHSList(p);save();
        setMode('edit'); // 생성 후 편집 모드 복귀
        openEdit(hs.id);
      },
      '생성',
      ()=>{ setMode('edit'); } // 취소 시에도 편집 모드 복귀
    );
  });

  // add-tb 모드: 빈 곳 클릭 → 텍스트박스 생성
  let textClickBlocked = false;
  cv.addEventListener('pointerdown',e=>{
    if(mode!=='add-tb')return;
    if(e.target.closest('.tb')){textClickBlocked=false;return;}
    if(activeTextBox!==null){textClickBlocked=true;}
    else{textClickBlocked=false;}
  });

  cv.addEventListener('click',e=>{
    if(mode!=='add-tb')return;
    if(e.target.closest('.ci')||e.target.closest('.hs')||e.target.closest('.tb'))return;
    const p=ST.pages[ST.cur];if(!p||!p.images.length)return;
    if(textClickBlocked){textClickBlocked=false;return;}
    const pt=cvPt(e.clientX,e.clientY);
    const W=cvW(),H=cvH();
    if(!p.tboxes)p.tboxes=[];
    const defW=Math.max(80, W*0.25);
    const defH=34;
    const cx=Math.min(pt.x, W-defW);
    const cy=Math.min(pt.y, H-defH);
    showConfirmDlg(
      '텍스트를 생성할까요?',
